// ─── Simple Python Interpreter ───
function runPython(code, userInputs = []) {
 const output = [];
 const vars = {};
 let inputIdx = 0;

 const evaluate = (expr, localVars = {}) => {
 const allVars = { ...vars, ...localVars };
 let e = expr.trim();
 if (e.includes("+")) {
 const parts = splitOutside(e, "+");
 if (parts.length > 1) {
 const ev = parts.map((p) => evaluate(p.trim(), localVars));
 if (ev.every((v) => typeof v === "string")) return ev.join("");
 if (ev.every((v) => typeof v === "number")) return ev.reduce((a, b) => a + b, 0);
 return ev.map(String).join("");
 }
 }
 for (const [op, fn] of [[" - ", (a,b)=>a-b], [" * ", (a,b)=>a*b], ["**", (a,b)=>Math.pow(a,b)], [" / ", (a,b)=>a/b], [" % ", (a,b)=>a%b]]) {
 if (op === "**" ? e.includes("**") : e.includes(op)) {
 const parts = op === "**" ? e.split("**") : splitOutside(e, op.trim());
 if (parts.length === 2) { const a = evaluate(parts[0].trim(), localVars), b = evaluate(parts[1].trim(), localVars); if (typeof a === "number" && typeof b === "number") return fn(a, b); }
 }
 }
 for (const op of ["==", "!=", ">=", "<=", ">", "<"]) {
 if (e.includes(op)) {
 const parts = splitOutside(e, op);
 if (parts.length === 2) { const a = evaluate(parts[0].trim(), localVars), b = evaluate(parts[1].trim(), localVars);
 return op==="=="?a==b : op==="!="?a!=b : op===">="?a>=b : op==="<="?a<=b : op===">"?a>b : a<b;
 }
 }
 }
 if (e.includes(" and ")) { const p = e.split(" and "); return evaluate(p[0].trim(), localVars) && evaluate(p[1].trim(), localVars); }
 if (e.includes(" or ")) { const p = e.split(" or "); return evaluate(p[0].trim(), localVars) || evaluate(p[1].trim(), localVars); }
 if (e.startsWith("not ")) return !evaluate(e.slice(4).trim(), localVars);

 const funcMatch = e.match(/^(\w+)\(([\s\S]*)\)$/);
 if (funcMatch) {
 const [, fn, argsStr] = funcMatch;
 if (fn === "print") {
 const args = smartSplit(argsStr); let end = "\n"; const filtered = [];
 for (const a of args) { const t = a.trim(); if (t.startsWith("end=")) end = evaluate(t.slice(4), localVars); else filtered.push(t); }
 const vals = filtered.map((a) => { const v = evaluate(a.trim(), localVars); return v===undefined?"None":v===true?"True":v===false?"False":String(v); });
 output.push({ text: vals.join(" "), end }); return undefined;
 }
 if (fn === "input") {
 const prompt = argsStr.trim() ? evaluate(argsStr.trim(), localVars) : "";
 if (prompt) output.push({ text: String(prompt), end: "" });
 const val = inputIdx < userInputs.length ? userInputs[inputIdx++] : "user_input";
 output.push({ text: val, end: "\n", isInput: true }); return val;
 }
 if (fn === "int") return parseInt(evaluate(argsStr.trim(), localVars));
 if (fn === "float") return parseFloat(evaluate(argsStr.trim(), localVars));
 if (fn === "str") return String(evaluate(argsStr.trim(), localVars));
 if (fn === "abs") return Math.abs(evaluate(argsStr.trim(), localVars));
 if (fn === "len") { const v = evaluate(argsStr.trim(), localVars); return typeof v==="string"?v.length:Array.isArray(v)?v.length:0; }
 if (fn === "round") { const a = smartSplit(argsStr); const n = evaluate(a[0].trim(), localVars); const d = a[1]?evaluate(a[1].trim(), localVars):0; return Number(n.toFixed(d)); }
 if (fn === "max") { return Math.max(...smartSplit(argsStr).map(a=>evaluate(a.trim(), localVars))); }
 if (fn === "min") { return Math.min(...smartSplit(argsStr).map(a=>evaluate(a.trim(), localVars))); }
 if (fn === "pow") { const a = smartSplit(argsStr); return Math.pow(evaluate(a[0].trim(), localVars), evaluate(a[1].trim(), localVars)); }
 if (fn === "range") {
 const a = smartSplit(argsStr).map(x=>evaluate(x.trim(), localVars));
 const start = a.length===1?0:a[0], end = a.length===1?a[0]:a[1], step = a[2]||1;
 const r = []; for (let i=start; step>0?i<end:i>end; i+=step) r.push(i); return r;
 }
 if (fn === "type") { const v = evaluate(argsStr.trim(), localVars); if (typeof v==="number"&&Number.isInteger(v)) return "<class 'int'>"; if (typeof v==="number") return "<class 'float'>"; if (typeof v==="string") return "<class 'str'>"; if (typeof v==="boolean") return "<class 'bool'>"; return "<class 'NoneType'>"; }
 if (fn === "enumerate") { const a = smartSplit(argsStr); const it = evaluate(a[0].trim(), localVars); const s = a[1]?evaluate(a[1].trim(), localVars):0; return Array.isArray(it)?it.map((v,i)=>[i+s,v]):[]; }
 if (fn === "list") { const v = evaluate(argsStr.trim(), localVars); return Array.isArray(v)?[...v]:[]; }
 if (fn === "map") { const a = smartSplit(argsStr); const f = evaluate(a[0].trim(), localVars); const l = evaluate(a[1].trim(), localVars); return typeof f==="function"&&Array.isArray(l)?l.map(f):[]; }
 if (allVars["__func_"+fn]) {
 const fd = allVars["__func_"+fn]; const ca = smartSplit(argsStr).map(a=>evaluate(a.trim(), localVars)); const ls = {};
 fd.params.forEach((p,i)=>{ const pn=p.includes("=")?p.split("=")[0].trim():p.trim(); const dv=p.includes("=")?evaluate(p.split("=")[1].trim(), localVars):undefined; ls[pn]=i<ca.length?ca[i]:dv; });
 return executeBlock(fd.body, {...allVars,...ls});
 }
 }
 const methodMatch = e.match(/^(\w+)\.(\w+)\((.*)\)$/s);
 if (methodMatch) { const [,obj,method,mArgs] = methodMatch; if (allVars[obj]!==undefined && method==="append" && Array.isArray(allVars[obj])) { allVars[obj].push(evaluate(mArgs.trim(), localVars)); if (vars[obj]!==undefined) vars[obj]=allVars[obj]; return undefined; } }
 const lambdaMatch = e.match(/^lambda\s+(\w+)\s*:\s*(.+)$/);
 if (lambdaMatch) { const [,param,body] = lambdaMatch; return (val) => evaluate(body, {...localVars,[param]:val}); }
 if (e.startsWith("[") && e.endsWith("]")) { const inner = e.slice(1,-1).trim(); if (!inner) return []; return smartSplit(inner).map(it=>evaluate(it.trim(), localVars)); }
 if ((e.startsWith('"')&&e.endsWith('"'))||(e.startsWith("'")&&e.endsWith("'"))) return e.slice(1,-1);
 if (e.startsWith('f"')&&e.endsWith('"')) return e.slice(2,-1).replace(/\{([^}]+)\}/g, (_,ex)=>String(evaluate(ex, localVars)));
 if (e === "True") return true; if (e === "False") return false; if (e === "None") return undefined;
 if (!isNaN(e) && e !== "") return Number(e);
 if (allVars[e] !== undefined) return allVars[e];
 const subMatch = e.match(/^(\w+)\[(.+)\]$/);
 if (subMatch) { const arr = allVars[subMatch[1]]; const idx = evaluate(subMatch[2], localVars); if (arr!==undefined) return Array.isArray(arr)?arr[idx]:typeof arr==="string"?arr[idx]:undefined; }
 return e;
 };

 function splitOutside(str, delim) {
 const parts = []; let cur = "", inStr = false, sc = "", depth = 0;
 for (let i = 0; i < str.length; i++) {
 const ch = str[i];
 if (!inStr&&(ch==='"'||ch==="'")) { inStr=true; sc=ch; cur+=ch; continue; }
 if (inStr&&ch===sc) { inStr=false; cur+=ch; continue; }
 if (!inStr&&(ch==="("||ch==="[")) { depth++; cur+=ch; continue; }
 if (!inStr&&(ch===")"||ch==="]")) { depth--; cur+=ch; continue; }
 if (!inStr&&depth===0&&str.slice(i,i+delim.length)===delim) { parts.push(cur); cur=""; i+=delim.length-1; continue; }
 cur+=ch;
 }
 parts.push(cur); return parts.length>1?parts:[str];
 }
 function smartSplit(str) {
 const parts = []; let cur = "", depth = 0, inStr = false, sc = "";
 for (const ch of str) {
 if (!inStr&&(ch==='"'||ch==="'")) { inStr=true; sc=ch; cur+=ch; continue; }
 if (inStr&&ch===sc) { inStr=false; cur+=ch; continue; }
 if (!inStr&&(ch==="("||ch==="[")) { depth++; cur+=ch; continue; }
 if (!inStr&&(ch===")"||ch==="]")) { depth--; cur+=ch; continue; }
 if (!inStr&&depth===0&&ch===",") { parts.push(cur); cur=""; continue; }
 cur+=ch;
 }
 if (cur.trim()) parts.push(cur); return parts;
 }
 function getIndent(line) { const m = line.match(/^(\s*)/); return m?m[1].length:0; }
 function getBlock(lines, start, base) { const b = []; for (let i=start;i<lines.length;i++) { if (lines[i].trim()==="") continue; if (getIndent(lines[i])>base) b.push(lines[i]); else break; } return b; }

 function executeBlock(blockLines, localVars = {}) {
 let i = 0;
 while (i < blockLines.length) {
 const line = blockLines[i].trim();
 if (!line || line.startsWith("#")) { i++; continue; }
 const indent = getIndent(blockLines[i]);
 if (line.startsWith("return ")) return evaluate(line.slice(7), localVars);
 if (line === "return") return undefined;
 if (line === "break") return "__BREAK__";
 if (line === "continue") return "__CONTINUE__";

 if (line.startsWith("def ")) {
 const m = line.match(/^def\s+(\w+)\(([^)]*)\)\s*:/);
 if (m) { const body = getBlock(blockLines, i+1, indent); vars["__func_"+m[1]] = { params: m[2]?m[2].split(",").map(p=>p.trim()):[], body }; localVars["__func_"+m[1]] = vars["__func_"+m[1]]; i+=1+body.length; continue; }
 }
 if (line.startsWith("for ")) {
 const m = line.match(/^for\s+(.+)\s+in\s+(.+)\s*:/);
 if (m) { const body = getBlock(blockLines, i+1, indent); const it = evaluate(m[2].trim(), localVars);
 if (Array.isArray(it)) for (const item of it) {
 if (m[1].includes(",")) { const vn = m[1].split(",").map(v=>v.trim()); if (Array.isArray(item)) vn.forEach((v,idx)=>{vars[v]=item[idx];localVars[v]=item[idx];}); }
 else { vars[m[1].trim()]=item; localVars[m[1].trim()]=item; }
 const r = executeBlock(body, localVars); if (r==="__BREAK__") break; if (r!==undefined&&r!=="__CONTINUE__") return r;
 }
 i+=1+body.length; continue;
 }
 }
 if (line.startsWith("while ")) {
 const cond = line.slice(6,-1).trim(); const body = getBlock(blockLines, i+1, indent); let s = 0;
 while (evaluate(cond, localVars) && s<500) { s++; const r = executeBlock(body, localVars); if (r==="__BREAK__") break; if (r!==undefined&&r!=="__CONTINUE__") return r; }
 i+=1+body.length; continue;
 }
 if (line.startsWith("if ")) {
 const cond = line.slice(3,-1).trim(); const body = getBlock(blockLines, i+1, indent);
 let consumed = 1+body.length; const branches = [{cond, body}]; let j = i+consumed;
 while (j < blockLines.length) {
 const nl = blockLines[j]?.trim();
 if (nl?.startsWith("elif ")) { const eb = getBlock(blockLines, j+1, indent); branches.push({cond:nl.slice(5,-1).trim(), body:eb}); consumed+=1+eb.length; j+=1+eb.length; }
 else if (nl==="else:") { const eb = getBlock(blockLines, j+1, indent); branches.push({cond:null, body:eb}); consumed+=1+eb.length; break; }
 else break;
 }
 for (const br of branches) { if (br.cond===null||evaluate(br.cond, localVars)) { const r = executeBlock(br.body, localVars); if (r!==undefined) return r; break; } }
 i+=consumed; continue;
 }
 if (line.includes("+=")) { const [vn, val] = line.split("+="); const v = vn.trim(); vars[v]=(vars[v]||0)+evaluate(val.trim(), localVars); localVars[v]=vars[v]; i++; continue; }
 if (line.includes("-=")) { const [vn, val] = line.split("-="); const v = vn.trim(); vars[v]=(vars[v]||0)-evaluate(val.trim(), localVars); localVars[v]=vars[v]; i++; continue; }
 if (line.includes("=") && !line.includes("==") && !line.includes("!=") && !line.includes(">=") && !line.includes("<=") && !line.startsWith("print") && !line.startsWith("if") && !line.startsWith("while") && !line.startsWith("for") && !line.startsWith("return")) {
 const eq = line.indexOf("="); const before = line.slice(0,eq).trim(); const after = line.slice(eq+1).trim();
 if (!before.includes("(")&&!before.includes(">")&&!before.includes("<")&&!before.includes("!")) { const val = evaluate(after, localVars); vars[before]=val; localVars[before]=val; }
 else evaluate(line, localVars);
 i++; continue;
 }
 evaluate(line, localVars); i++;
 }
 return undefined;
 }

 try { executeBlock(code.split("\n").map(l=>l.replace(/\r/g,""))); }
 catch (err) { output.push({ text: "Error: " + err.message, end: "\n", isError: true }); }
 let finalOutput = ""; for (const o of output) finalOutput += o.text + (o.end !== undefined ? o.end : "");
 return { output: finalOutput.trimEnd(), items: output };
}



// ─── JavaScript Interpreter ───
function runJavaScript(code, userInputs = []) {
 const output = [];
 let inputIdx = 0;
 const mockConsole = {
 log: (...args) => output.push({ text: args.map(a => {
 if (a === null) return "null";
 if (a === undefined) return "undefined";
 if (typeof a === "object") try { return JSON.stringify(a); } catch(e) { return String(a); }
 return String(a);
 }).join(" "), end: "\n" }),
 error: (...args) => output.push({ text: "Error: " + args.map(String).join(" "), end: "\n", isError: true }),
 warn: (...args) => output.push({ text: "Warning: " + args.map(String).join(" "), end: "\n" }),
 };
 const mockPrompt = (msg) => {
 output.push({ text: (msg || "") + " ", end: "" });
 if (inputIdx < userInputs.length) { const v = userInputs[inputIdx++]; output.push({ text: v, end: "\n", isInput: true }); return v; }
 return "";
 };
 const mockAlert = (msg) => output.push({ text: "[Alert] " + String(msg), end: "\n" });
 const mockDocument = {
 getElementById: () => ({ innerHTML: "", textContent: "", style: {}, classList: { add:()=>{}, remove:()=>{}, toggle:()=>{} }, addEventListener:()=>{}, setAttribute:()=>{}, getAttribute:()=>"", appendChild:()=>{}, removeChild:()=>{}, value: "" }),
 querySelector: () => null,
 querySelectorAll: () => [],
 createElement: (tag) => ({ tagName: tag, innerHTML: "", textContent: "", style: {}, classList: { add:()=>{}, remove:()=>{} }, appendChild:()=>{}, setAttribute:()=>{}, children: [] }),
 body: { appendChild:()=>{}, innerHTML: "" },
 };
 try {
 const fn = new Function("console","prompt","alert","document","setTimeout","setInterval", code);
 fn(mockConsole, mockPrompt, mockAlert, mockDocument, ()=>{}, ()=>{});
 } catch (err) {
 output.push({ text: "Error: " + err.message, end: "\n", isError: true });
 }
 return { output: output.map(o => o.text + (o.end || "")).join(""), items: output };
}

 { type: "exercise", title: "Type Casting", content: "Convert types!", question: 'Convert the text "42" into an integer, the number 10 into a float, and 3.14 into an integer. Print each result.', answer: 'print(int("42"))\nprint(float(10))\nprint(int(3.14))', check: (v) => v.includes("int(") && v.includes("float(") },
 { type: "exercise", title: "Age Calculator", content: "Build something useful!", question: 'Ask the user for their birth year, convert it to a number, calculate their age by subtracting from 2025, then print a message with their age.', answer: 'year = int(input("Birth year? "))\nage = 2025 - year\nprint("You are " + str(age) + " years old!")', check: (v) => v.includes("int(") && v.includes("input") },
 ]},
 { title: "Comparisons", sections: [
 { type: "lesson", title: "Comparing Values", content: "You can ask Python to compare two values and it'll tell you True or False! You can check if things are equal, not equal, greater than, less than, and more. Double-equals checks if two things are the same (single equals is for storing values — don't mix them up!)." },
 { type: "exercise", title: "True or False?", content: "Try comparisons!", question: 'Print the results of these comparisons: Is 10 greater than 5? Is 3 equal to 3? Is 7 less than 2? Is 10 not equal to 10?', answer: 'print(10 > 5)\nprint(3 == 3)\nprint(7 < 2)\nprint(10 != 10)', check: (v) => v.includes("print") && (v.includes(">")||v.includes("<")||v.includes("==")) },
 { type: "minigame", title: "Comparison Rush", gameType: "speedType" },
 ]},
 { title: "Math Functions", sections: [
 { type: "lesson", title: "Built-in Math", content: "Python comes with handy math tools built right in! You can get the absolute value of a number (how far it is from zero), round a decimal to the nearest whole number, find the biggest or smallest number in a group, and raise numbers to a power — all without writing the math yourself." },
 { type: "exercise", title: "Function Fun", content: "Use math functions!", question: 'Use built-in math functions to print: the absolute value of -15, 3.7 rounded, the max of 10/20/5, and the min of 10/20/5.', answer: 'print(abs(-15))\nprint(round(3.7))\nprint(max(10, 20, 5))\nprint(min(10, 20, 5))', check: (v) => v.includes("abs(") && v.includes("round(") },
 { type: "exercise", title: "Number Formatter", content: "Round to 2 decimals!", question: 'Divide 10 by 3, round the result to 2 decimal places, and print it.', answer: 'result = round(10/3, 2)\nprint(result)', check: (v) => v.includes("round(") && v.includes("print") },
 ]},
 { title: "Numbers Review", sections: [
 { type: "lesson", title: "Numbers Mastered!", content: "You can now work with numbers, math, casting, comparisons, and functions!" },
 { type: "exercise", title: "Tip Calculator", content: "Build a tip calculator!", question: 'Ask the user for a bill amount, convert it to a decimal number, calculate a 15% tip, then print the tip rounded to 2 decimal places.', answer: 'bill = float(input("Bill: "))\ntip = bill * 0.15\nprint("Tip: " + str(round(tip, 2)))', check: (v) => v.includes("float(") && v.includes("0.15") },
 { type: "minigame", title: "Math Master", gameType: "codePuzzle" },
 ]},
 ]}],
 },

 // ═══════════════════════════════════════════════
 // TIER 3: BEGINNER-INTERMEDIATE (Foxley)
 // ═══════════════════════════════════════════════
 { tier: "Beginner-Intermediate", tierColor: "#F6AD55", tierBg: "linear-gradient(135deg, #F6AD55 0%, #ED8936 100%)", character: "fox",
 units: [{ title: "If/Else Logic", desc: "Making decisions in code", stones: [
 { title: "If Statements", sections: [
 { type: "lesson", title: "Making Decisions", content: "What if you want your code to do different things depending on the situation? That's where 'if' statements come in! You give the computer a condition to check, and if it's true, it runs the indented code below. If it's not true, it skips right over it. Think of it like: 'If it's raining, bring an umbrella!'" },
 { type: "exercise", title: "First If", content: "Write a condition!", question: 'Set a variable age to 15. Write an if statement that checks if age is 13 or more, and if so, prints "You are a teenager!"', answer: 'age = 15\nif age >= 13:\n print("You are a teenager!")', check: (v) => v.includes("if") && v.includes("print") },
 { type: "exercise", title: "If-Else", content: "Add an else!", question: 'Set a variable num to 5. If it is greater than 0, print "Positive!" Otherwise print "Not positive!"', answer: 'num = 5\nif num > 0:\n print("Positive!")\nelse:\n print("Not positive!")', check: (v) => v.includes("if") && v.includes("else") },
 ]},
 { title: "Elif Chains", sections: [
 { type: "lesson", title: "Multiple Conditions", content: "What if you have more than two options? Use 'elif' (short for 'else if') to check additional conditions! Your program checks each condition from top to bottom and runs whichever one is true first. You can have as many elif branches as you need, plus an else at the end for everything that didn't match." },
 { type: "exercise", title: "Grade Checker", content: "Build a grade checker!", question: 'Set a score to 85. Use if, elif, and else to print "A" for 90+, "B" for 80+, "C" for 70+, or "F" for anything lower.', answer: 'score = 85\nif score >= 90:\n print("A")\nelif score >= 80:\n print("B")\nelif score >= 70:\n print("C")\nelse:\n print("F")', check: (v) => v.includes("if") && v.includes("elif") },
 { type: "minigame", title: "Logic Puzzle", gameType: "codePuzzle" },
 ]},
 { title: "Logic Operators", sections: [
 { type: "lesson", title: "Logical Operators", content: "You can combine conditions using special words! 'and' means BOTH conditions must be true. 'or' means at LEAST ONE must be true. 'not' flips a condition — it turns true into false and false into true. For example: 'if it's sunny AND warm, go to the beach!'" },
 { type: "exercise", title: "Combine Conditions", content: "Use and/or!", question: 'Set age to 14 and height to 50. Use "and" to check if both age is at least 12 AND height is at least 48. Print "You can ride!" or "Sorry!" accordingly.', answer: 'age = 14\nheight = 50\nif age >= 12 and height >= 48:\n print("You can ride!")\nelse:\n print("Sorry!")', check: (v) => v.includes("and") && v.includes("if") },
 { type: "exercise", title: "Boolean Vars", content: "Work with booleans!", question: 'Create two boolean variables: is_weekend (True) and is_holiday (False). If either one is true, print "Day off!" Otherwise print "Work day!"', answer: 'is_weekend = True\nis_holiday = False\nif is_weekend or is_holiday:\n print("Day off!")\nelse:\n print("Work day!")', check: (v) => v.includes("True") && v.includes("if") },
 ]},
 { title: "Nested Decisions", sections: [
 { type: "lesson", title: "Ifs Inside Ifs", content: "You can put an if statement inside another if statement — this is called 'nesting.' It's like asking a follow-up question: 'Are you hungry? If yes, do you want pizza or pasta?' The inner if only gets checked when the outer if is already true." },
 { type: "exercise", title: "Nested Logic", content: "Create nested conditions!", question: 'Create two variables: raining and umbrella (both set to "yes"). If it is raining, check if you have an umbrella. Print the right message for each situation.', answer: 'raining = "yes"\numbrella = "yes"\nif raining == "yes":\n if umbrella == "yes":\n print("Go outside!")\n else:\n print("Stay inside!")\nelse:\n print("Enjoy the sun!")', check: (v) => (v.match(/if/g)||[]).length >= 2 },
 { type: "exercise", title: "Adventure Game", content: "Mini text adventure!", question: 'Print "You find a door and a window." Set a choice to "door". Use if/else so picking the door prints "You find treasure!" and anything else prints "You escape!"', answer: 'print("You find a door and a window.")\nchoice = "door"\nif choice == "door":\n print("You find treasure!")\nelse:\n print("You escape!")', check: (v) => v.includes("if") && v.includes("print") },
 ]},
 { title: "Booleans Deep", sections: [
 { type: "lesson", title: "True & False", content: "In Python, there's a special type called a 'boolean' that can only be one of two things: True or False. Every comparison you make gives back a boolean. They're the foundation of all the decision-making your code does! Think of them as yes/no answers." },
 { type: "exercise", title: "Menu System", content: "Build a menu!", question: 'Print two menu options ("1. Greet" and "2. Math"). Set a choice variable to "1", then use if/else to respond differently based on the choice.', answer: 'print("1. Greet")\nprint("2. Math")\nchoice = "1"\nif choice == "1":\n print("Hello!")\nelse:\n print("2+2 = 4")', check: (v) => v.includes("if") && v.includes("print") },
 { type: "lesson", title: "Logic Complete!", content: "Mastered: if/elif/else, logical operators, nesting, booleans!" },
 { type: "minigame", title: "Logic Sprint", gameType: "speedType" },
 ]},
 ]}],
 },

 // ═══════════════════════════════════════════════
 // TIER 4: INTERMEDIATE (Foxley)

 { tier: "Intermediate", tierColor: "#FC8181", tierBg: "linear-gradient(135deg, #FC8181 0%, #F56565 100%)", character: "fox",
 units: [{ title: "Loops & Iteration", desc: "Repeat things automatically", stones: [
 { title: "For Loops", sections: [
 { type: "lesson", title: "Repeating Code", content: "Instead of writing the same thing over and over, you can use a 'for loop' to repeat code automatically! You tell the computer how many times to repeat, and it does the work for you. It's like saying 'do this 5 times' — the computer counts for you and runs your code each time." },
 { type: "exercise", title: "Count Up", content: "Write a loop!", question: 'Use a for loop with range to print every number from 1 to 10.', answer: 'for i in range(1, 11):\n print(i)', check: (v) => v.includes("for") && v.includes("range") },
 { type: "exercise", title: "Sum Numbers", content: "Add in a loop!", question: 'Use a for loop to add up all numbers from 1 to 100, then print the total.', answer: 'total = 0\nfor i in range(1, 101):\n total += i\nprint(total)', check: (v) => v.includes("for") && v.includes("+=") },
 ]},
 { title: "While Loops", sections: [
 { type: "lesson", title: "Loop Until Done", content: "A 'while loop' keeps repeating as long as a condition stays true — it's like saying 'keep going until you're done.' You set up a condition, and the loop checks it each time. When the condition finally becomes false, the loop stops. Just make sure the condition eventually changes, or the loop will go on forever!" },
 { type: "exercise", title: "Countdown", content: "Build a countdown!", question: 'Use a while loop to count down from 10 to 1, printing each number, then print "Liftoff!" at the end.', answer: 'count = 10\nwhile count > 0:\n print(count)\n count -= 1\nprint("Liftoff!")', check: (v) => v.includes("while") && v.includes("Liftoff") },
 { type: "minigame", title: "Loop Bug Hunt", gameType: "bugSquash" },
 ]},
 { title: "Nested Loops", sections: [
 { type: "lesson", title: "Loops in Loops", content: "You can put a loop inside another loop! The inner loop runs completely every time the outer loop goes around once. It's like a clock — the minute hand (inner loop) goes all the way around for every step of the hour hand (outer loop). This is great for making grids and patterns!" },
 { type: "exercise", title: "Star Rectangle", content: "Make a pattern!", question: 'Use two nested for loops to print a rectangle of stars that is 3 rows tall and 5 stars wide.', answer: 'for i in range(3):\n for j in range(5):\n print("*", end=" ")\n print()', check: (v) => (v.match(/for/g)||[]).length >= 2 },
 ]},
 { title: "Loop Control", sections: [
 { type: "lesson", title: "Break & Continue", content: "Sometimes you need to escape a loop early or skip a round. The word 'break' lets you exit a loop immediately — like an emergency stop button. The word 'continue' skips the rest of the current round and jumps straight to the next one. These give you fine control over how your loops behave!" },
 { type: "exercise", title: "Number Finder", content: "Use break!", question: 'Loop through numbers 1 to 20. When you find one divisible by 7, print it and stop the loop using break.', answer: 'for i in range(1, 21):\n if i % 7 == 0:\n print(i)\n break', check: (v) => v.includes("break") },
 { type: "exercise", title: "Skip Odds", content: "Use continue!", question: 'Loop through numbers 1 to 20 but skip the odd ones using continue. Only print the even numbers.', answer: 'for i in range(1, 21):\n if i % 2 != 0:\n continue\n print(i)', check: (v) => v.includes("continue") },
 ]},
 { title: "Looping Lists", sections: [
 { type: "lesson", title: "Iterating Items", content: "One of the most useful things about loops is going through a list of items one by one! Instead of counting numbers, you can loop through names, foods, colors — anything in a list. Each time around, the loop grabs the next item for you to work with." },
 { type: "exercise", title: "List Loop", content: "Loop through a list!", question: 'Create a list of three colors. Loop through it and print each color with a number in front (like "1. red", "2. blue").', answer: 'colors = ["red", "blue", "green"]\nfor i, color in enumerate(colors, 1):\n print(str(i) + ". " + color)', check: (v) => v.includes("for") && v.includes("[") },
 { type: "exercise", title: "FizzBuzz", content: "The classic challenge!", question: 'Loop from 1 to 30. For multiples of both 3 and 5 print "FizzBuzz", for multiples of 3 print "Fizz", for multiples of 5 print "Buzz", otherwise print the number.', answer: 'for i in range(1, 31):\n if i % 3 == 0 and i % 5 == 0:\n print("FizzBuzz")\n elif i % 3 == 0:\n print("Fizz")\n elif i % 5 == 0:\n print("Buzz")\n else:\n print(i)', check: (v) => v.includes("Fizz") && v.includes("Buzz") },
 { type: "lesson", title: "Loop Legend!", content: "Mastered: for, while, nested loops, break, continue, list loops!" },
 { type: "minigame", title: "Loop Master", gameType: "codePuzzle" },
 ]},
 ]}],
 },

 // ═══════════════════════════════════════════════
 // TIER 5: FUNCTIONS (Professor Hoot)
 // ═══════════════════════════════════════════════
 { tier: "Functions", tierColor: "#A29BFE", tierBg: "linear-gradient(135deg, #A29BFE 0%, #6C5CE7 100%)", character: "owl",
 units: [{ title: "Functions", desc: "Reusable code blocks", stones: [
 { title: "Defining Functions", sections: [
 { type: "lesson", title: "What are Functions?", content: "A function is a reusable block of code with a name. Instead of writing the same steps over and over, you wrap them in a function and just call its name whenever you need it! Functions can take in information (called 'parameters'), do something with it, and give back a result." },
 { type: "exercise", title: "First Function", content: "Create a function!", question: 'Create a function called double that takes a number and returns it multiplied by 2. Then print the result of calling it with 5.', answer: 'def double(n):\n return n * 2\n\nprint(double(5))', check: (v) => v.includes("def") && v.includes("return") },
 { type: "exercise", title: "Multiple Params", content: "Multiple parameters!", question: 'Create a function called add_three that takes three numbers and returns their sum. Print the result of calling it with 10, 20, and 30.', answer: 'def add_three(a, b, c):\n return a + b + c\n\nprint(add_three(10, 20, 30))', check: (v) => v.includes("def") && v.includes("return") },
 ]},
 { title: "Return Values", sections: [
 { type: "lesson", title: "Returning Data", content: "When a function finishes its work, it can send a value back using 'return.' Think of it like ordering food — you give the kitchen your order (the parameters), they cook it (the function runs), and they hand back your meal (the return value). You can then store or use that returned value however you want!" },
 { type: "exercise", title: "Max of Three", content: "Find the biggest!", question: 'Create a function that takes three numbers and returns the biggest one using if/elif/else. Test it by printing the result with 3, 7, and 5.', answer: 'def max_of_three(a, b, c):\n if a >= b and a >= c:\n return a\n elif b >= c:\n return b\n else:\n return c\n\nprint(max_of_three(3, 7, 5))', check: (v) => v.includes("def") && v.includes("return") && v.includes("if") },
 { type: "minigame", title: "Function Fix", gameType: "bugSquash" },
 ]},
 { title: "Scope & Defaults", sections: [
 { type: "lesson", title: "Variable Scope", content: "Variables created inside a function only exist inside that function — this is called 'local scope.' It's like writing on a whiteboard in a classroom: when you leave the room, the writing stays behind. Variables outside functions are 'global' and can be seen everywhere." },
 { type: "lesson", title: "Default Parameters", content: "You can give your function parameters a default value — a backup option that gets used if nothing else is provided. It's like a drink order: 'I'll have coffee, and if they don't ask about size, make it a medium.' This makes your functions more flexible and easier to use!" },
 { type: "exercise", title: "Flexible Function", content: "Use defaults!", question: 'Create a function called power that takes a base and an optional exponent (default 2). It should return the base raised to the exponent. Test it with and without the second argument.', answer: 'def power(base, exp=2):\n return base ** exp\n\nprint(power(3))\nprint(power(2, 3))', check: (v) => v.includes("def") && v.includes("return") },
 ]},
 { title: "Advanced Functions", sections: [
 { type: "lesson", title: "Quick Functions", content: "Sometimes you need a tiny function that only does one simple thing — like doubling a number. Python has a shortcut called 'lambda' that lets you create these mini-functions in a single line. There's also a tool called 'map' that applies a function to every item in a list, saving you from writing a loop!" },
 { type: "exercise", title: "Lambda Time", content: "Write lambda functions!", question: 'Create a lambda function that squares a number. Use map to apply it to the list [1, 2, 3, 4, 5] and print the results.', answer: 'square = lambda x: x ** 2\nnums = [1, 2, 3, 4, 5]\nresult = list(map(square, nums))\nprint(result)', check: (v) => v.includes("lambda") && v.includes("map") },
 { type: "exercise", title: "Multi-Function", content: "Use multiple functions!", question: 'Create two functions: add and multiply. Each takes two numbers. Print the results of calling both with 3 and 4.', answer: 'def add(a, b):\n return a + b\n\ndef multiply(a, b):\n return a * b\n\nprint(add(3, 4))\nprint(multiply(3, 4))', check: (v) => (v.match(/def/g)||[]).length >= 2 },
 { type: "lesson", title: "Function Wizard!", content: "Mastered: functions, parameters, return, scope, defaults, lambda, map!" },
 { type: "minigame", title: "Function Sprint", gameType: "speedType" },
 ]},
 ]}],
 },

 // ═══════════════════════════════════════════════
 // TIER 6: DATA STRUCTURES (Professor Hoot)
 // ═══════════════════════════════════════════════
 { tier: "Data Structures", tierColor: "#68D391", tierBg: "linear-gradient(135deg, #68D391 0%, #48BB78 100%)", character: "owl",
 units: [{ title: "Collections", desc: "Organize your data", stones: [
 { title: "Lists Basics", sections: [
 { type: "lesson", title: "What are Lists?", content: "A list is like a container that holds multiple items in order. You can store numbers, text, or even a mix of both! Lists use square brackets and commas between items. You can add, remove, change, and search items in a list. They're one of the most useful tools in Python." },
 { type: "exercise", title: "Create a List", content: "Make your first list!", question: 'Create a list called fruits with three fruits in it, then print the entire list.', answer: 'fruits = ["apple", "banana", "cherry"]\nprint(fruits)', check: (v) => v.includes("[") && v.includes("]") && v.includes("print") },
 { type: "exercise", title: "Access Items", content: "Get items by position!", question: 'Create a list of colors. Print the first item (index 0) and the last item (index -1).', answer: 'colors = ["red", "blue", "green"]\nprint(colors[0])\nprint(colors[-1])', check: (v) => v.includes("[0]") && v.includes("[-1]") },
 ]},
 { title: "List Operations", sections: [
 { type: "lesson", title: "Changing Lists", content: "Lists are 'mutable' which means you can change them after creating them! You can add items to the end with append, insert items at a specific position, remove items, sort the list, reverse it, and find out how many items are in it with len. Lists are incredibly flexible!" },
 { type: "exercise", title: "Build a List", content: "Add and remove items!", question: 'Start with an empty list. Use append to add three numbers (10, 20, 30). Then remove the middle one and print the result.', answer: 'nums = []\nnums.append(10)\nnums.append(20)\nnums.append(30)\nnums.remove(20)\nprint(nums)', check: (v) => v.includes("append") && v.includes("remove") },
 { type: "exercise", title: "List Slicing", content: "Get portions of a list!", question: 'Create a list of numbers 1 through 5. Print just the first three items using slicing, then print the last two items.', answer: 'nums = [1, 2, 3, 4, 5]\nprint(nums[:3])\nprint(nums[-2:])', check: (v) => v.includes(":") && v.includes("[") },
 { type: "minigame", title: "List Fix", gameType: "bugSquash" },
 ]},
 { title: "Dictionaries", sections: [
 { type: "lesson", title: "Key-Value Pairs", content: "A dictionary stores data in pairs: a 'key' and a 'value.' Instead of using number positions like lists, you look things up by name! It's like a real dictionary where you look up a word (key) to find its definition (value). Use curly braces to create them, with colons between each key and value." },
 { type: "exercise", title: "First Dictionary", content: "Make a dictionary!", question: 'Create a dictionary called person with keys "name", "age", and "city" with any values. Print each value by its key.', answer: 'person = {"name": "Alex", "age": 15, "city": "New York"}\nprint(person["name"])\nprint(person["age"])\nprint(person["city"])', check: (v) => v.includes("{") && v.includes(":") && v.includes("}") },
 { type: "exercise", title: "Update a Dict", content: "Add and change values!", question: 'Create a dictionary for a game character with "health" and "score". Add a new key "level" and increase the score. Print the updated dictionary.', answer: 'hero = {"health": 100, "score": 0}\nhero["level"] = 1\nhero["score"] = hero["score"] + 50\nprint(hero)', check: (v) => v.includes("{") && v.includes("[") },
 ]},
 { title: "Tuples & Sets", sections: [
 { type: "lesson", title: "Tuples are Fixed", content: "A tuple is like a list that can never be changed once created — it's 'immutable.' Use regular parentheses to make them. Tuples are useful when you want data that should never be accidentally modified, like coordinates or days of the week." },
 { type: "lesson", title: "Sets are Unique", content: "A set is a collection where every item appears only once — no duplicates allowed! Sets are great for removing duplicates from data and for checking if something is a member. They also support math-like operations: union (combine), intersection (overlap), and difference." },
 { type: "exercise", title: "Tuple Practice", content: "Work with tuples!", question: 'Create a tuple of coordinates (10, 20). Print each value individually and print the length of the tuple.', answer: 'coords = (10, 20)\nprint(coords[0])\nprint(coords[1])\nprint(len(coords))', check: (v) => v.includes("(") && v.includes("len(") },
 { type: "exercise", title: "Set Magic", content: "Remove duplicates!", question: 'Create a list with some duplicate numbers. Convert it to a set to remove duplicates, then print the result.', answer: 'nums = [1, 2, 2, 3, 3, 3, 4]\nunique = set(nums)\nprint(unique)', check: (v) => v.includes("set(") },
 { type: "minigame", title: "Structure Sprint", gameType: "speedType" },
 ]},
 { title: "Nested Structures", sections: [
 { type: "lesson", title: "Data Inside Data", content: "You can put lists inside lists, dictionaries inside dictionaries, lists of dictionaries — any combination! This lets you represent complex real-world data. A list of student dictionaries, for instance, where each student has a name, grade, and list of subjects." },
 { type: "exercise", title: "List of Dicts", content: "Build complex data!", question: 'Create a list containing two dictionaries, each with a "name" and "score" key. Loop through the list and print each name with their score.', answer: 'students = [{"name": "Alice", "score": 92}, {"name": "Bob", "score": 85}]\nfor s in students:\n print(s["name"] + ": " + str(s["score"]))', check: (v) => v.includes("[{") && v.includes("for") },
 { type: "exercise", title: "Nested Access", content: "Dig into nested data!", question: 'Create a dictionary where one value is a list. Access and print an item from that inner list.', answer: 'data = {"colors": ["red", "blue", "green"], "count": 3}\nprint(data["colors"][1])', check: (v) => v.includes('["') && v.includes("[") },
 { type: "lesson", title: "Data Master!", content: "You now know lists, dictionaries, tuples, sets, and how to nest them! These are the building blocks for any program." },
 ]},
 ]}],
 },

 // ═══════════════════════════════════════════════
 // TIER 7: STRING MASTERY (Pyro)
 // ═══════════════════════════════════════════════
 { tier: "String Mastery", tierColor: "#F56565", tierBg: "linear-gradient(135deg, #F56565 0%, #E53E3E 100%)", character: "dragon",
 units: [{ title: "Text Power", desc: "Master string manipulation", stones: [
 { title: "String Methods", sections: [
 { type: "lesson", title: "Built-in String Tools", content: "Strings come with tons of built-in methods! You can convert text to uppercase or lowercase, check if a string starts or ends with certain text, replace parts of a string, strip whitespace from the edges, and much more. These methods don't change the original — they create a new string." },
 { type: "exercise", title: "Case Changes", content: "Transform text!", question: 'Create a string "Hello World". Print it in all uppercase, then all lowercase, then with the first letter of each word capitalized (title case).', answer: 'text = "Hello World"\nprint(text.upper())\nprint(text.lower())\nprint(text.title())', check: (v) => v.includes(".upper()") && v.includes(".lower()") },

 // ═══════════════════════════════════════════════
 // TIER 8: ERROR HANDLING (Pyro)
 // ═══════════════════════════════════════════════
 { tier: "Error Handling", tierColor: "#ED8936", tierBg: "linear-gradient(135deg, #ED8936 0%, #DD6B20 100%)", character: "dragon",
 units: [{ title: "Bulletproof Code", desc: "Handle errors gracefully", stones: [
 { title: "Try & Except", sections: [
 { type: "lesson", title: "Catching Errors", content: "Sometimes code goes wrong — a user types letters when you expect numbers, or you try to divide by zero. Instead of crashing, you can wrap risky code in a 'try' block and handle the error gracefully in an 'except' block. It's like having a safety net for your code!" },
 { type: "exercise", title: "First Try", content: "Catch an error!", question: 'Write a try/except that attempts to convert the text "hello" to an integer. When it fails, print a friendly error message instead of crashing.', answer: 'try:\n num = int("hello")\nexcept:\n print("That is not a number!")', check: (v) => v.includes("try") && v.includes("except") },
 { type: "exercise", title: "Safe Division", content: "Handle divide by zero!", question: 'Write a function called safe_divide that takes two numbers and returns their division. Use try/except to handle division by zero and return 0 instead. Test it with both normal and zero cases.', answer: 'def safe_divide(a, b):\n try:\n return a / b\n except:\n return 0\n\nprint(safe_divide(10, 2))\nprint(safe_divide(10, 0))', check: (v) => v.includes("try") && v.includes("except") && v.includes("def") },
 ]},
 { title: "Error Types", sections: [
 { type: "lesson", title: "Specific Errors", content: "Python has different types of errors for different situations: ValueError when a value is wrong, TypeError when types don't match, KeyError when a dictionary key is missing, IndexError when a list index is out of range. You can catch specific error types to handle each situation differently!" },
 { type: "exercise", title: "Catch Specific", content: "Handle specific errors!", question: 'Write code that tries to access index 10 of a short list. Catch the IndexError specifically and print a message saying the index does not exist.', answer: 'my_list = [1, 2, 3]\ntry:\n print(my_list[10])\nexcept IndexError:\n print("That index does not exist!")', check: (v) => v.includes("except") && (v.includes("IndexError") || v.includes("Error")) },
 { type: "exercise", title: "Multiple Catches", content: "Handle different errors!", question: 'Write a try block that might cause either a ValueError or a ZeroDivisionError. Add separate except blocks for each with different messages.', answer: 'try:\n num = int("abc")\n result = 10 / 0\nexcept ValueError:\n print("Bad value!")\nexcept ZeroDivisionError:\n print("Cannot divide by zero!")', check: (v) => (v.match(/except/g)||[]).length >= 2 },
 { type: "minigame", title: "Error Fix", gameType: "bugSquash" },
 ]},
 { title: "Input Validation", sections: [
 { type: "lesson", title: "Validating Input", content: "One of the most important uses of error handling is validating user input. Users can type literally anything! You should always check that input is valid before using it. Combine loops with try/except to keep asking until the user gives good input. This makes your programs robust and user-friendly." },
 { type: "exercise", title: "Safe Input", content: "Validate user input!", question: 'Write a loop that keeps asking the user for a number until they give a valid one. Use try/except inside the loop. When they give a valid number, print it and stop.', answer: 'while True:\n try:\n num = int(input("Enter a number: "))\n print("You entered: " + str(num))\n break\n except:\n print("Invalid! Try again.")', check: (v) => v.includes("while") && v.includes("try") && v.includes("break") },
 { type: "exercise", title: "Range Check", content: "Check value ranges!", question: 'Ask the user for a number between 1 and 10. Keep asking until they give a valid number in that range. Use both error handling and an if check.', answer: 'while True:\n try:\n n = int(input("Number 1-10: "))\n if n >= 1 and n <= 10:\n print("Valid: " + str(n))\n break\n else:\n print("Out of range!")\n except:\n print("Not a number!")', check: (v) => v.includes("while") && v.includes("try") && v.includes("if") },
 ]},
 { title: "Finally & Raising", sections: [
 { type: "lesson", title: "Finally Block", content: "The 'finally' block runs no matter what — whether the try succeeded or an exception was caught. It's perfect for cleanup tasks like closing a file or resetting a variable. You can also 'raise' your own exceptions on purpose when something isn't right in your code." },
 { type: "exercise", title: "Raise Errors", content: "Create your own errors!", question: 'Write a function that takes an age parameter. If age is negative, raise a ValueError with a message. Otherwise print the age. Test it with both a valid and invalid age using try/except.', answer: 'def check_age(age):\n if age < 0:\n raise ValueError("Age cannot be negative")\n print("Age: " + str(age))\n\ntry:\n check_age(25)\n check_age(-5)\nexcept ValueError:\n print("Invalid age!")', check: (v) => v.includes("raise") && v.includes("def") },
 { type: "lesson", title: "Error Handler!", content: "You can now build robust programs that handle any unexpected situation gracefully. No more crashes — just smooth error recovery!" },
 { type: "minigame", title: "Error Sprint", gameType: "codePuzzle" },
 ]},
 ]}],
 },

 // ═══════════════════════════════════════════════
 // TIER 9: OOP (Merlin)
 // ═══════════════════════════════════════════════
 { tier: "Object-Oriented", tierColor: "#9F7AEA", tierBg: "linear-gradient(135deg, #9F7AEA 0%, #805AD5 100%)", character: "wizard",
 units: [{ title: "Classes & Objects", desc: "Build your own data types", stones: [
 { title: "First Class", sections: [
 { type: "lesson", title: "What are Classes?", content: "A class is like a blueprint for creating objects. Think of it like a cookie cutter — the class defines the shape, and each cookie (object) you make from it has the same structure but can have different decorations. Classes let you bundle data and actions together into one neat package." },
 { type: "exercise", title: "Create a Class", content: "Build your first class!", question: 'Create a class called Dog with an __init__ method that takes a name. Store it as self.name. Add a bark method that prints the dog\'s name plus "says Woof!". Create a dog and make it bark.', answer: 'class Dog:\n def __init__(self, name):\n self.name = name\n def bark(self):\n print(self.name + " says Woof!")\n\nmy_dog = Dog("Rex")\nmy_dog.bark()', check: (v) => v.includes("class") && v.includes("self") && v.includes("def __init__") },
 ]},
 { title: "Attributes & Methods", sections: [
 { type: "lesson", title: "Object Data", content: "Objects can hold data (attributes) and do things (methods). Attributes are variables that belong to an object, set using self. Methods are functions that belong to a class. Every method gets 'self' as its first parameter — that's how the method knows which object it's working with." },
 { type: "exercise", title: "Rich Objects", content: "Add multiple attributes!", question: 'Create a Player class with name, health (default 100), and score (default 0). Add a take_damage method that reduces health and a gain_points method. Create a player and test both methods.', answer: 'class Player:\n def __init__(self, name):\n self.name = name\n self.health = 100\n self.score = 0\n def take_damage(self, amount):\n self.health = self.health - amount\n def gain_points(self, points):\n self.score = self.score + points\n\np = Player("Hero")\np.take_damage(20)\np.gain_points(50)\nprint(p.name + ": HP=" + str(p.health) + " Score=" + str(p.score))', check: (v) => v.includes("class") && v.includes("self.") && (v.match(/def/g)||[]).length >= 3 },
 { type: "minigame", title: "Class Fix", gameType: "bugSquash" },
 ]},
 { title: "Inheritance", sections: [
 { type: "lesson", title: "Building on Classes", content: "Inheritance lets you create a new class based on an existing one! The new class (child) automatically gets everything from the original class (parent), and you can add new features or change existing ones. It's like making a 'deluxe' version — same base features plus extras." },
 { type: "exercise", title: "Extend a Class", content: "Create a child class!", question: 'Create an Animal class with a name and a speak method that prints the name. Then create a Cat class that inherits from Animal and overrides speak to say the name plus "says Meow!". Test it.', answer: 'class Animal:\n def __init__(self, name):\n self.name = name\n def speak(self):\n print(self.name)\n\nclass Cat(Animal):\n def speak(self):\n print(self.name + " says Meow!")\n\nc = Cat("Whiskers")\nc.speak()', check: (v) => (v.match(/class/g)||[]).length >= 2 && v.includes("(Animal)") },
 { type: "exercise", title: "Super Power", content: "Use super()!", question: 'Create a Vehicle class with make and model. Create an ElectricCar that inherits from Vehicle and adds a battery_size attribute using super().__init__() to call the parent constructor. Print its details.', answer: 'class Vehicle:\n def __init__(self, make, model):\n self.make = make\n self.model = model\n\nclass ElectricCar(Vehicle):\n def __init__(self, make, model, battery):\n super().__init__(make, model)\n self.battery = battery\n\ncar = ElectricCar("Tesla", "Model 3", 75)\nprint(car.make + " " + car.model + " " + str(car.battery) + "kWh")', check: (v) => v.includes("super()") && (v.match(/class/g)||[]).length >= 2 },
 ]},
 { title: "Magic Methods", sections: [
 { type: "lesson", title: "Special Methods", content: "Python classes have 'magic methods' (also called dunder methods) that let your objects work with built-in operations! __str__ controls what happens when you print an object. __len__ lets you use len() on it. __add__ lets you use + between objects. They start and end with double underscores." },
 { type: "exercise", title: "String Magic", content: "Make printable objects!", question: 'Create a Point class with x and y. Add a __str__ method that returns a nicely formatted string like "(3, 5)". Create a point and print it.', answer: 'class Point:\n def __init__(self, x, y):\n self.x = x\n self.y = y\n def __str__(self):\n return "(" + str(self.x) + ", " + str(self.y) + ")"\n\np = Point(3, 5)\nprint(p)', check: (v) => v.includes("__str__") && v.includes("class") },
 { type: "lesson", title: "OOP Master!", content: "You now understand classes, objects, attributes, methods, inheritance, super(), and magic methods. You can model any real-world concept in code!" },
 { type: "minigame", title: "OOP Sprint", gameType: "codePuzzle" },
 ]},
 ]}],
 },

 // TIER 10: ADVANCED PYTHON (Sage)

 { tier: "Advanced Python", tierColor: "#F6E05E", tierBg: "linear-gradient(135deg, #F6E05E 0%, #ECC94B 100%)", character: "sage",
 units: [{ title: "Python Mastery", desc: "Expert-level techniques", stones: [
 { title: "Comprehensions", sections: [
 { type: "lesson", title: "List Comprehensions", content: "List comprehensions are a powerful one-liner way to create lists! Instead of writing a loop to build a list, you can do it all in a single expression inside square brackets. You can include conditions to filter items too. It's the Pythonic way to transform and filter data — elegant and fast." },
 { type: "exercise", title: "First Comprehension", content: "Create lists in one line!", question: 'Use a list comprehension to create a list of squares from 1 to 10 (1, 4, 9, 16... 100). Print the result.', answer: 'squares = [x ** 2 for x in range(1, 11)]\nprint(squares)', check: (v) => v.includes("[") && v.includes("for") && v.includes("in") && !v.includes("append") },

 ]},
 { title: "Dict Comprehensions", sections: [
 { type: "lesson", title: "Dict & Set Comprehensions", content: "Comprehensions work for dictionaries and sets too! A dict comprehension uses curly braces with key:value pairs. A set comprehension uses curly braces without colons. These are incredibly useful for transforming data from one format to another in a single clean expression." },
 { type: "exercise", title: "Dict Comprehension", content: "Build dicts efficiently!", question: 'Use a dictionary comprehension to create a dictionary where keys are numbers 1-5 and values are their squares. Print it.', answer: 'squares = {x: x ** 2 for x in range(1, 6)}\nprint(squares)', check: (v) => v.includes("{") && v.includes(":") && v.includes("for") },
 { type: "exercise", title: "Transform Data", content: "Reshape data!", question: 'Create a list of names. Use a dict comprehension to create a dictionary mapping each name to its length. Print it.', answer: 'names = ["Alice", "Bob", "Charlie"]\nname_lengths = {name: len(name) for name in names}\nprint(name_lengths)', check: (v) => v.includes("{") && v.includes("len(") && v.includes("for") },
 { type: "minigame", title: "Comprehension Rush", gameType: "speedType" },
 ]},
 { title: "Generators & Decorators", sections: [
 { type: "lesson", title: "Generators", content: "A generator is a special function that produces values one at a time using 'yield' instead of 'return.' It's memory efficient because it doesn't store all values at once — it generates each one on demand. Think of it like a vending machine that makes items as you ask for them, rather than storing everything upfront." },
 { type: "lesson", title: "Decorators", content: "A decorator is a function that wraps another function to extend its behavior without modifying it. You write a function that takes a function as input, adds something extra, and returns the enhanced version. The @ symbol is shorthand for applying a decorator. They're used everywhere in professional Python!" },
 { type: "exercise", title: "Generator Function", content: "Create a generator!", question: 'Write a generator function called countdown that yields numbers from a given start down to 1. Use a for loop to print each value from countdown(5).', answer: 'def countdown(n):\n while n > 0:\n yield n\n n = n - 1\n\nfor num in countdown(5):\n print(num)', check: (v) => v.includes("yield") && v.includes("def") },
 { type: "exercise", title: "Simple Decorator", content: "Wrap a function!", question: 'Write a decorator called shout that makes any function\'s return value uppercase. Apply it to a greet function that returns "hello world" and print the result.', answer: 'def shout(func):\n def wrapper():\n result = func()\n return result.upper()\n return wrapper\n\ndef greet():\n return "hello world"\n\ngreet = shout(greet)\nprint(greet())', check: (v) => v.includes("def") && (v.match(/def/g)||[]).length >= 3 && v.includes("return") },
 ]},
 { title: "Recursion", sections: [
 { type: "lesson", title: "Functions Calling Themselves", content: "Recursion is when a function calls itself to solve a problem by breaking it into smaller pieces. Every recursive function needs a 'base case' that stops the recursion, and a 'recursive case' that makes progress toward the base case. It's like Russian nesting dolls — each doll opens to reveal a smaller one until you reach the smallest." },
 { type: "exercise", title: "Factorial", content: "Classic recursion!", question: 'Write a recursive function called factorial that returns n! (n times n-1 times n-2... down to 1). The base case is that factorial(0) equals 1. Print factorial(5).', answer: 'def factorial(n):\n if n == 0:\n return 1\n return n * factorial(n - 1)\n\nprint(factorial(5))', check: (v) => v.includes("def factorial") && v.includes("factorial(") && v.includes("return") },
 { type: "exercise", title: "Fibonacci", content: "The famous sequence!", question: 'Write a recursive function that returns the nth Fibonacci number (where fib(0)=0, fib(1)=1, and each number is the sum of the two before it). Print the first 10 numbers using a loop.', answer: 'def fib(n):\n if n <= 1:\n return n\n return fib(n - 1) + fib(n - 2)\n\nfor i in range(10):\n print(fib(i))', check: (v) => v.includes("def fib") && v.includes("fib(") && v.includes("return") },
 { type: "minigame", title: "Recursion Rush", gameType: "codePuzzle" },
 ]},
 { title: "Algorithms", sections: [
 { type: "lesson", title: "Searching", content: "Algorithms are step-by-step procedures for solving problems. Linear search checks each item one by one. Binary search is much faster — it works on sorted data by repeatedly cutting the search space in half, like looking up a word in a dictionary by opening to the middle." },
 { type: "exercise", title: "Binary Search", content: "Implement a fast search!", question: 'Write a binary_search function that takes a sorted list and a target value. It should return the index if found, or -1 if not. Test it on a sorted list of numbers.', answer: 'def binary_search(lst, target):\n low = 0\n high = len(lst) - 1\n while low <= high:\n mid = (low + high) // 2\n if lst[mid] == target:\n return mid\n elif lst[mid] < target:\n low = mid + 1\n else:\n high = mid - 1\n return -1\n\nnums = [1, 3, 5, 7, 9, 11]\nprint(binary_search(nums, 7))\nprint(binary_search(nums, 4))', check: (v) => v.includes("def") && v.includes("while") && v.includes("mid") },
 ]},
 { title: "Sorting", sections: [
 { type: "lesson", title: "Sorting Algorithms", content: "Sorting puts data in order. Bubble sort compares neighboring items and swaps them if they're out of order, repeating until everything's sorted. It's simple but slow. Python's built-in sort is much faster, but understanding how sorting works under the hood is essential for any real programmer." },
 { type: "exercise", title: "Bubble Sort", content: "Sort it yourself!", question: 'Write a bubble_sort function that takes a list and returns it sorted by repeatedly comparing and swapping adjacent elements. Test it on an unsorted list.', answer: 'def bubble_sort(lst):\n n = len(lst)\n for i in range(n):\n for j in range(0, n - i - 1):\n if lst[j] > lst[j + 1]:\n lst[j], lst[j + 1] = lst[j + 1], lst[j]\n return lst\n\nprint(bubble_sort([64, 34, 25, 12, 22]))', check: (v) => v.includes("def") && (v.match(/for/g)||[]).length >= 2 && v.includes("lst[") },
 { type: "lesson", title: "Python Graduate!", content: "Congratulations! You've mastered Python from absolute beginner to advanced concepts: algorithms, recursion, OOP, decorators, generators, comprehensions, error handling, data structures, and more. You can build literally anything. Go create something amazing!" },
 { type: "minigame", title: "Victory Lap!", gameType: "speedType" },
 ]},
 ]}],
 },

function CodeTerminal({code,visible,onClose,language}) {
 const [userInputs,setUserInputs]=useState([]); const [currentInput,setCurrentInput]=useState(""); const [result,setResult]=useState(null); const [running,setRunning]=useState(false); const [needsInput,setNeedsInput]=useState(false); const inputRef=useRef(null);
 useEffect(()=>{
 if(visible){const ic=(code.match(/input\(/g)||[]).length;if(ic>0){setNeedsInput(true);setUserInputs([]);setResult(null);setRunning(false);}else{setNeedsInput(false);setRunning(true);setTimeout(()=>{setResult(runCode(code,language||"python",[]));setRunning(false);},400);}}
 else{setResult(null);setRunning(false);setNeedsInput(false);setUserInputs([]);setCurrentInput("");}
 },[visible,code]);
 const submitInput=()=>{const ni=[...userInputs,currentInput];setUserInputs(ni);setCurrentInput("");const ic=(code.match(/input\(/g)||[]).length;if(ni.length>=ic){setRunning(true);setNeedsInput(false);setTimeout(()=>{setResult(runCode(code,language||"python",ni));setRunning(false);},400);}};
 useEffect(()=>{if(needsInput&&inputRef.current)inputRef.current.focus();},[needsInput,userInputs]);
 if(!visible)return null;
 const ic=(code.match(/input\(/g)||[]).length;
 return (
 <div style={{background:"#0D1117",borderRadius:16,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden",marginTop:12,animation:"fadeIn 0.2s"}}>
 <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"rgba(255,255,255,0.04)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
 <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:12,height:12,borderRadius:"50%",background:"#F56565"}}/><div style={{width:12,height:12,borderRadius:"50%",background:"#F6AD55"}}/><div style={{width:12,height:12,borderRadius:"50%",background:"#48BB78"}}/><span style={{marginLeft:8,fontSize:12,color:"rgba(255,255,255,0.4)",fontFamily:"'Fira Code', monospace"}}>output.py</span></div>
 <button onClick={onClose} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:16,padding:"2px 6px"}}>{"✕"}</button>
 </div>
 <div style={{padding:16,fontFamily:"'Fira Code', 'Courier New', monospace",fontSize:14,minHeight:80,maxHeight:250,overflowY:"auto"}}>
 {running&&<div style={{color:"#F6AD55",display:"flex",alignItems:"center",gap:8}}><span style={{animation:"pulse 1s infinite"}}>{"●"}</span> Running...</div>}
 {needsInput&&!result&&<div>
 <div style={{color:"#48BB78",marginBottom:8}}>{">"} Program needs {ic} input{ic>1?"s":""}. Enter input {userInputs.length+1} of {ic}:</div>
 {userInputs.map((inp,i)=>(<div key={i} style={{color:"rgba(255,255,255,0.5)",marginBottom:4}}><span style={{color:"#63B3ED"}}>input {i+1}:</span> {inp}</div>))}
 {userInputs.length<ic&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
 <span style={{color:"#48BB78"}}>{">"}</span>
 <input ref={inputRef} value={currentInput} onChange={e=>setCurrentInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitInput()} placeholder="Type input..." style={{flex:1,background:"transparent",border:"none",color:"#fff",fontSize:14,fontFamily:"'Fira Code', monospace",outline:"none"}}/>
 <button onClick={submitInput} style={{padding:"4px 12px",borderRadius:6,background:"rgba(72,187,120,0.2)",border:"1px solid rgba(72,187,120,0.3)",color:"#48BB78",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>Enter</button>
 </div>}
 </div>}
 {result&&<div>
 <div style={{color:"#48BB78",marginBottom:8,fontSize:12,opacity:0.7}}>{">"} Output:</div>
 {result.output?<pre style={{margin:0,color:"#E2E8F0",whiteSpace:"pre-wrap",lineHeight:1.7}}>{result.output}</pre>:<span style={{color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>(no output)</span>}
 {result.items?.some(i=>i.isError)&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"rgba(245,101,101,0.1)",color:"#F56565",fontSize:13}}>{"⚠"} Error in your code. Check for typos!</div>}
 </div>}
 </div>
 </div>
 );
}

 return (
 <div style={appS}><style>{gs}</style>
 {placementTest!==null&&<PlacementTest tierIdx={placementTest} language={lang} onPass={()=>handleTestPass(placementTest)} onFail={()=>setPlacementTest(null)} onCancel={()=>setPlacementTest(null)}/>}
 {buildMode?<BuildMode user={user} language={lang} onBack={()=>setBuildMode(false)}/>
 :activeStone?<StoneDetailView stone={curriculum[activeStone.tierIdx].units[activeStone.unitIdx].stones[activeStone.stoneIdx]} character={curriculum[activeStone.tierIdx].character} language={lang} progress={progress[`${lang}-${activeStone.tierIdx}-${activeStone.unitIdx}-${activeStone.stoneIdx}`]||[]} onSectionComplete={handleSC} onBack={()=>setActiveStone(null)}/>
 :<WorldMap user={user} progress={progress} curriculum={curriculum} onSelectStone={(t,u,s)=>setActiveStone({tierIdx:t,unitIdx:u,stoneIdx:s})} onJumpTo={ti=>setPlacementTest(ti)} onBuild={()=>setBuildMode(true)} onChangeLang={()=>{setLang(null);setActiveStone(null);}}/>}
 </div>
 );
}


 const root = ReactDOM.createRoot(document.getElementById("root"));
 root.render(<App />);
 </script>
