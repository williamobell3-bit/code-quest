// ─── Simple Python Interpreter ───
function runPython(code, userInputs = []) {
  const output = [];
  const vars = {};
  let inputIdx = 0;

  const evaluate = (expr, localVars = {}) => {
    const allVars = { ...vars, ...localVars };
    let e = expr.trim();
    if (e.includes("+")) {
      const parts = splitOutside(e, "+");
      if (parts.length > 1) {
        const ev = parts.map((p) => evaluate(p.trim(), localVars));
        if (ev.every((v) => typeof v === "string")) return ev.join("");
        if (ev.every((v) => typeof v === "number")) return ev.reduce((a, b) => a + b, 0);
        return ev.map(String).join("");
      }
    }
    for (const [op, fn] of [[" - ", (a,b)=>a-b], [" * ", (a,b)=>a*b], ["**", (a,b)=>Math.pow(a,b)], [" / ", (a,b)=>a/b], [" % ", (a,b)=>a%b]]) {
      if (op === "**" ? e.includes("**") : e.includes(op)) {
        const parts = op === "**" ? e.split("**") : splitOutside(e, op.trim());
        if (parts.length === 2) { const a = evaluate(parts[0].trim(), localVars), b = evaluate(parts[1].trim(), localVars); if (typeof a === "number" && typeof b === "number") return fn(a, b); }
      }
    }
    for (const op of ["==", "!=", ">=", "<=", ">", "<"]) {
      if (e.includes(op)) {
        const parts = splitOutside(e, op);
        if (parts.length === 2) { const a = evaluate(parts[0].trim(), localVars), b = evaluate(parts[1].trim(), localVars);
          return op==="=="?a==b : op==="!="?a!=b : op===">="?a>=b : op==="<="?a<=b : op===">"?a>b : a<b;
        }
      }
    }
    if (e.includes(" and ")) { const p = e.split(" and "); return evaluate(p[0].trim(), localVars) && evaluate(p[1].trim(), localVars); }
    if (e.includes(" or ")) { const p = e.split(" or "); return evaluate(p[0].trim(), localVars) || evaluate(p[1].trim(), localVars); }
    if (e.startsWith("not ")) return !evaluate(e.slice(4).trim(), localVars);

    const funcMatch = e.match(/^(\w+)\(([\s\S]*)\)$/);
    if (funcMatch) {
      const [, fn, argsStr] = funcMatch;
      if (fn === "print") {
        const args = smartSplit(argsStr); let end = "\n"; const filtered = [];
        for (const a of args) { const t = a.trim(); if (t.startsWith("end=")) end = evaluate(t.slice(4), localVars); else filtered.push(t); }
        const vals = filtered.map((a) => { const v = evaluate(a.trim(), localVars); return v===undefined?"None":v===true?"True":v===false?"False":String(v); });
        output.push({ text: vals.join(" "), end }); return undefined;
      }
      if (fn === "input") {
        const prompt = argsStr.trim() ? evaluate(argsStr.trim(), localVars) : "";
        if (prompt) output.push({ text: String(prompt), end: "" });
        const val = inputIdx < userInputs.length ? userInputs[inputIdx++] : "user_input";
        output.push({ text: val, end: "\n", isInput: true }); return val;
      }
      if (fn === "int") return parseInt(evaluate(argsStr.trim(), localVars));
      if (fn === "float") return parseFloat(evaluate(argsStr.trim(), localVars));
      if (fn === "str") return String(evaluate(argsStr.trim(), localVars));
      if (fn === "abs") return Math.abs(evaluate(argsStr.trim(), localVars));
      if (fn === "len") { const v = evaluate(argsStr.trim(), localVars); return typeof v==="string"?v.length:Array.isArray(v)?v.length:0; }
      if (fn === "round") { const a = smartSplit(argsStr); const n = evaluate(a[0].trim(), localVars); const d = a[1]?evaluate(a[1].trim(), localVars):0; return Number(n.toFixed(d)); }
      if (fn === "max") { return Math.max(...smartSplit(argsStr).map(a=>evaluate(a.trim(), localVars))); }
      if (fn === "min") { return Math.min(...smartSplit(argsStr).map(a=>evaluate(a.trim(), localVars))); }
      if (fn === "pow") { const a = smartSplit(argsStr); return Math.pow(evaluate(a[0].trim(), localVars), evaluate(a[1].trim(), localVars)); }
      if (fn === "range") {
        const a = smartSplit(argsStr).map(x=>evaluate(x.trim(), localVars));
        const start = a.length===1?0:a[0], end = a.length===1?a[0]:a[1], step = a[2]||1;
        const r = []; for (let i=start; step>0?i<end:i>end; i+=step) r.push(i); return r;
      }
      if (fn === "type") { const v = evaluate(argsStr.trim(), localVars); if (typeof v==="number"&&Number.isInteger(v)) return "<class 'int'>"; if (typeof v==="number") return "<class 'float'>"; if (typeof v==="string") return "<class 'str'>"; if (typeof v==="boolean") return "<class 'bool'>"; return "<class 'NoneType'>"; }
      if (fn === "enumerate") { const a = smartSplit(argsStr); const it = evaluate(a[0].trim(), localVars); const s = a[1]?evaluate(a[1].trim(), localVars):0; return Array.isArray(it)?it.map((v,i)=>[i+s,v]):[]; }
      if (fn === "list") { const v = evaluate(argsStr.trim(), localVars); return Array.isArray(v)?[...v]:[]; }
      if (fn === "map") { const a = smartSplit(argsStr); const f = evaluate(a[0].trim(), localVars); const l = evaluate(a[1].trim(), localVars); return typeof f==="function"&&Array.isArray(l)?l.map(f):[]; }
      if (allVars["__func_"+fn]) {
        const fd = allVars["__func_"+fn]; const ca = smartSplit(argsStr).map(a=>evaluate(a.trim(), localVars)); const ls = {};
        fd.params.forEach((p,i)=>{ const pn=p.includes("=")?p.split("=")[0].trim():p.trim(); const dv=p.includes("=")?evaluate(p.split("=")[1].trim(), localVars):undefined; ls[pn]=i<ca.length?ca[i]:dv; });
        return executeBlock(fd.body, {...allVars,...ls});
      }
    }
    const methodMatch = e.match(/^(\w+)\.(\w+)\((.*)\)$/s);
    if (methodMatch) { const [,obj,method,mArgs] = methodMatch; if (allVars[obj]!==undefined && method==="append" && Array.isArray(allVars[obj])) { allVars[obj].push(evaluate(mArgs.trim(), localVars)); if (vars[obj]!==undefined) vars[obj]=allVars[obj]; return undefined; } }
    const lambdaMatch = e.match(/^lambda\s+(\w+)\s*:\s*(.+)$/);
    if (lambdaMatch) { const [,param,body] = lambdaMatch; return (val) => evaluate(body, {...localVars,[param]:val}); }
    if (e.startsWith("[") && e.endsWith("]")) { const inner = e.slice(1,-1).trim(); if (!inner) return []; return smartSplit(inner).map(it=>evaluate(it.trim(), localVars)); }
    if ((e.startsWith('"')&&e.endsWith('"'))||(e.startsWith("'")&&e.endsWith("'"))) return e.slice(1,-1);
    if (e.startsWith('f"')&&e.endsWith('"')) return e.slice(2,-1).replace(/\{([^}]+)\}/g, (_,ex)=>String(evaluate(ex, localVars)));
    if (e === "True") return true; if (e === "False") return false; if (e === "None") return undefined;
    if (!isNaN(e) && e !== "") return Number(e);
    if (allVars[e] !== undefined) return allVars[e];
    const subMatch = e.match(/^(\w+)\[(.+)\]$/);
    if (subMatch) { const arr = allVars[subMatch[1]]; const idx = evaluate(subMatch[2], localVars); if (arr!==undefined) return Array.isArray(arr)?arr[idx]:typeof arr==="string"?arr[idx]:undefined; }
    return e;
  };

  function splitOutside(str, delim) {
    const parts = []; let cur = "", inStr = false, sc = "", depth = 0;
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (!inStr&&(ch==='"'||ch==="'")) { inStr=true; sc=ch; cur+=ch; continue; }
      if (inStr&&ch===sc) { inStr=false; cur+=ch; continue; }
      if (!inStr&&(ch==="("||ch==="[")) { depth++; cur+=ch; continue; }
      if (!inStr&&(ch===")"||ch==="]")) { depth--; cur+=ch; continue; }
      if (!inStr&&depth===0&&str.slice(i,i+delim.length)===delim) { parts.push(cur); cur=""; i+=delim.length-1; continue; }
      cur+=ch;
    }
    parts.push(cur); return parts.length>1?parts:[str];
  }
  function smartSplit(str) {
    const parts = []; let cur = "", depth = 0, inStr = false, sc = "";
    for (const ch of str) {
      if (!inStr&&(ch==='"'||ch==="'")) { inStr=true; sc=ch; cur+=ch; continue; }
      if (inStr&&ch===sc) { inStr=false; cur+=ch; continue; }
      if (!inStr&&(ch==="("||ch==="[")) { depth++; cur+=ch; continue; }
      if (!inStr&&(ch===")"||ch==="]")) { depth--; cur+=ch; continue; }
      if (!inStr&&depth===0&&ch===",") { parts.push(cur); cur=""; continue; }
      cur+=ch;
    }
    if (cur.trim()) parts.push(cur); return parts;
  }
  function getIndent(line) { const m = line.match(/^(\s*)/); return m?m[1].length:0; }
  function getBlock(lines, start, base) { const b = []; for (let i=start;i<lines.length;i++) { if (lines[i].trim()==="") continue; if (getIndent(lines[i])>base) b.push(lines[i]); else break; } return b; }

  function executeBlock(blockLines, localVars = {}) {
    let i = 0;
    while (i < blockLines.length) {
      const line = blockLines[i].trim();
      if (!line || line.startsWith("#")) { i++; continue; }
      const indent = getIndent(blockLines[i]);
      if (line.startsWith("return ")) return evaluate(line.slice(7), localVars);
      if (line === "return") return undefined;
      if (line === "break") return "__BREAK__";
      if (line === "continue") return "__CONTINUE__";

      if (line.startsWith("def ")) {
        const m = line.match(/^def\s+(\w+)\(([^)]*)\)\s*:/);
        if (m) { const body = getBlock(blockLines, i+1, indent); vars["__func_"+m[1]] = { params: m[2]?m[2].split(",").map(p=>p.trim()):[], body }; localVars["__func_"+m[1]] = vars["__func_"+m[1]]; i+=1+body.length; continue; }
      }
      if (line.startsWith("for ")) {
        const m = line.match(/^for\s+(.+)\s+in\s+(.+)\s*:/);
        if (m) { const body = getBlock(blockLines, i+1, indent); const it = evaluate(m[2].trim(), localVars);
          if (Array.isArray(it)) for (const item of it) {
            if (m[1].includes(",")) { const vn = m[1].split(",").map(v=>v.trim()); if (Array.isArray(item)) vn.forEach((v,idx)=>{vars[v]=item[idx];localVars[v]=item[idx];}); }
            else { vars[m[1].trim()]=item; localVars[m[1].trim()]=item; }
            const r = executeBlock(body, localVars); if (r==="__BREAK__") break; if (r!==undefined&&r!=="__CONTINUE__") return r;
          }
          i+=1+body.length; continue;
        }
      }
      if (line.startsWith("while ")) {
        const cond = line.slice(6,-1).trim(); const body = getBlock(blockLines, i+1, indent); let s = 0;
        while (evaluate(cond, localVars) && s<500) { s++; const r = executeBlock(body, localVars); if (r==="__BREAK__") break; if (r!==undefined&&r!=="__CONTINUE__") return r; }
        i+=1+body.length; continue;
      }
      if (line.startsWith("if ")) {
        const cond = line.slice(3,-1).trim(); const body = getBlock(blockLines, i+1, indent);
        let consumed = 1+body.length; const branches = [{cond, body}]; let j = i+consumed;
        while (j < blockLines.length) {
          const nl = blockLines[j]?.trim();
          if (nl?.startsWith("elif ")) { const eb = getBlock(blockLines, j+1, indent); branches.push({cond:nl.slice(5,-1).trim(), body:eb}); consumed+=1+eb.length; j+=1+eb.length; }
          else if (nl==="else:") { const eb = getBlock(blockLines, j+1, indent); branches.push({cond:null, body:eb}); consumed+=1+eb.length; break; }
          else break;
        }
        for (const br of branches) { if (br.cond===null||evaluate(br.cond, localVars)) { const r = executeBlock(br.body, localVars); if (r!==undefined) return r; break; } }
        i+=consumed; continue;
      }
      if (line.includes("+=")) { const [vn, val] = line.split("+="); const v = vn.trim(); vars[v]=(vars[v]||0)+evaluate(val.trim(), localVars); localVars[v]=vars[v]; i++; continue; }
      if (line.includes("-=")) { const [vn, val] = line.split("-="); const v = vn.trim(); vars[v]=(vars[v]||0)-evaluate(val.trim(), localVars); localVars[v]=vars[v]; i++; continue; }
      if (line.includes("=") && !line.includes("==") && !line.includes("!=") && !line.includes(">=") && !line.includes("<=") && !line.startsWith("print") && !line.startsWith("if") && !line.startsWith("while") && !line.startsWith("for") && !line.startsWith("return")) {
        const eq = line.indexOf("="); const before = line.slice(0,eq).trim(); const after = line.slice(eq+1).trim();
        if (!before.includes("(")&&!before.includes(">")&&!before.includes("<")&&!before.includes("!")) { const val = evaluate(after, localVars); vars[before]=val; localVars[before]=val; }
        else evaluate(line, localVars);
        i++; continue;
      }
      evaluate(line, localVars); i++;
    }
    return undefined;
  }

  try { executeBlock(code.split("\n").map(l=>l.replace(/\r/g,""))); }
  catch (err) { output.push({ text: "Error: " + err.message, end: "\n", isError: true }); }
  let finalOutput = ""; for (const o of output) finalOutput += o.text + (o.end !== undefined ? o.end : "");
  return { output: finalOutput.trimEnd(), items: output };
}

function PlacementTest({tierIdx,onPass,onFail,onCancel}) {
  const questions=PLACEMENT_TESTS[tierIdx]||[]; const [cur,setCur]=useState(0); const [answers,setAnswers]=useState([]); const [sel,setSel]=useState(null); const [done,setDone]=useState(false);

        <div style={{background:"#1A1A2E",borderRadius:24,padding:40,maxWidth:480,width:"90vw",textAlign:"center",border:`2px solid ${passed?"#48BB78":"#F56565"}40`}}>

          <h2 style={{fontSize:26,fontWeight:800,margin:"0 0 8px",color:passed?"#48BB78":"#F56565"}}>{passed?"Test Passed!":"Not Quite Yet"}</h2>
          <p style={{color:"rgba(255,255,255,0.6)",marginBottom:8}}>{correct}/{questions.length} correct ({Math.round(correct/questions.length*100)}%)</p>
          <p style={{color:"rgba(255,255,255,0.4)",marginBottom:24,fontSize:13}}>{passed?`Welcome to ${tier.tier}!`:"Need 70% to skip. Try the earlier lessons!"}</p>
          <button onClick={passed?onPass:onFail} style={{padding:"14px 32px",borderRadius:14,border:"none",background:passed?"linear-gradient(135deg, #48BB78, #38A169)":"linear-gradient(135deg, #A29BFE, #6C5CE7)",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:16}}>{passed?`Jump to ${tier.tier}! \u2192`:"Back to Map"}</button>
        </div>
      </div>

  }
  const q=questions[cur];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:"#1A1A2E",borderRadius:24,padding:"36px 32px",maxWidth:540,width:"90vw",border:`2px solid ${tier.tierColor}30`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>

          <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>{cur+1}/{questions.length}</span><button onClick={onCancel} style={{width:32,height:32,borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:16}}>{"\u2715"}</button></div>
        </div>
        <div style={{height:4,borderRadius:2,background:"rgba(255,255,255,0.06)",marginBottom:24}}><div style={{height:"100%",borderRadius:2,background:tier.tierBg,width:`${cur/questions.length*100}%`,transition:"width 0.3s"}}/></div>
        <p style={{fontSize:17,fontWeight:600,lineHeight:1.6,marginBottom:24,color:"rgba(255,255,255,0.9)"}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          {q.opts.map((opt,idx)=>(<button key={idx} onClick={()=>setSel(idx)} style={{padding:"14px 18px",borderRadius:14,border:sel===idx?`2px solid ${tier.tierColor}`:"1px solid rgba(255,255,255,0.08)",background:sel===idx?`${tier.tierColor}12`:"rgba(255,255,255,0.03)",color:sel===idx?"#fff":"rgba(255,255,255,0.7)",cursor:"pointer",textAlign:"left",fontFamily:"inherit",fontSize:15,fontWeight:sel===idx?700:400}}><span style={{display:"inline-block",width:28,color:sel===idx?tier.tierColor:"rgba(255,255,255,0.3)",fontWeight:700}}>{String.fromCharCode(65+idx)}.</span>{opt}</button>))}

function CodeTerminal({code,visible,onClose}) {
  const [userInputs,setUserInputs]=useState([]); const [currentInput,setCurrentInput]=useState(""); const [result,setResult]=useState(null); const [running,setRunning]=useState(false); const [needsInput,setNeedsInput]=useState(false); const inputRef=useRef(null);
  useEffect(()=>{
    if(visible){const ic=(code.match(/input\(/g)||[]).length;if(ic>0){setNeedsInput(true);setUserInputs([]);setResult(null);setRunning(false);}else{setNeedsInput(false);setRunning(true);setTimeout(()=>{setResult(runPython(code,[]));setRunning(false);},400);}}
    else{setResult(null);setRunning(false);setNeedsInput(false);setUserInputs([]);setCurrentInput("");}
  },[visible,code]);
  const submitInput=()=>{const ni=[...userInputs,currentInput];setUserInputs(ni);setCurrentInput("");const ic=(code.match(/input\(/g)||[]).length;if(ni.length>=ic){setRunning(true);setNeedsInput(false);setTimeout(()=>{setResult(runPython(code,ni));setRunning(false);},400);}};
  useEffect(()=>{if(needsInput&&inputRef.current)inputRef.current.focus();},[needsInput,userInputs]);
  if(!visible)return null;
  const ic=(code.match(/input\(/g)||[]).length;
  return (
    <div style={{background:"#0D1117",borderRadius:16,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden",marginTop:12,animation:"fadeIn 0.2s"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"rgba(255,255,255,0.04)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:12,height:12,borderRadius:"50%",background:"#F56565"}}/><div style={{width:12,height:12,borderRadius:"50%",background:"#F6AD55"}}/><div style={{width:12,height:12,borderRadius:"50%",background:"#48BB78"}}/><span style={{marginLeft:8,fontSize:12,color:"rgba(255,255,255,0.4)",fontFamily:"'Fira Code', monospace"}}>output.py</span></div>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:16,padding:"2px 6px"}}>{"\u2715"}</button>
      </div>
      <div style={{padding:16,fontFamily:"'Fira Code', 'Courier New', monospace",fontSize:14,minHeight:80,maxHeight:250,overflowY:"auto"}}>
        {running&&<div style={{color:"#F6AD55",display:"flex",alignItems:"center",gap:8}}><span style={{animation:"pulse 1s infinite"}}>{"\u25CF"}</span> Running...</div>}
        {needsInput&&!result&&<div>
          <div style={{color:"#48BB78",marginBottom:8}}>{"\u25B6"} Program needs {ic} input{ic>1?"s":""}. Enter input {userInputs.length+1} of {ic}:</div>
          {userInputs.map((inp,i)=>(<div key={i} style={{color:"rgba(255,255,255,0.5)",marginBottom:4}}><span style={{color:"#63B3ED"}}>input {i+1}:</span> {inp}</div>))}
          {userInputs.length<ic&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
            <span style={{color:"#48BB78"}}>{">"}</span>
            <input ref={inputRef} value={currentInput} onChange={e=>setCurrentInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitInput()} placeholder="Type input..." style={{flex:1,background:"transparent",border:"none",color:"#fff",fontSize:14,fontFamily:"'Fira Code', monospace",outline:"none"}}/>
            <button onClick={submitInput} style={{padding:"4px 12px",borderRadius:6,background:"rgba(72,187,120,0.2)",border:"1px solid rgba(72,187,120,0.3)",color:"#48BB78",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>Enter</button>
          </div>}
        </div>}
        {result&&<div>
          <div style={{color:"#48BB78",marginBottom:8,fontSize:12,opacity:0.7}}>{"\u25B6"} Output:</div>
          {result.output?<pre style={{margin:0,color:"#E2E8F0",whiteSpace:"pre-wrap",lineHeight:1.7}}>{result.output}</pre>:<span style={{color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>(no output)</span>}
          {result.items?.some(i=>i.isError)&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"rgba(245,101,101,0.1)",color:"#F56565",fontSize:13}}>{"\u26A0"} Error in your code. Check for typos!</div>}
        </div>}
      </div>
    </div>
  );
}

function MiniGame({gameType,onComplete}) {
  const gd=MINIGAME_DATA[gameType]; const [ci,setCi]=useState(0); const [score,setScore]=useState(0); const [input,setInput]=useState(""); const [fb,setFb]=useState(null); const [po,setPo]=useState([]); const [st,setSt]=useState(null); const [el,setEl]=useState(0); const [done,setDone]=useState(false);
  useEffect(()=>{if(gameType==="codePuzzle"&&gd.challenges[ci]){const l=gd.challenges[ci].lines.length;setPo([...Array(l).keys()].sort(()=>Math.random()-0.5));}if(gameType==="speedType")setSt(Date.now());},[ci,gameType]);
  useEffect(()=>{if(gameType==="speedType"&&st&&!done){const t=setInterval(()=>setEl(((Date.now()-st)/1000).toFixed(1)),100);return()=>clearInterval(t);}},[st,gameType,done]);
  if(done){return(<div style={{textAlign:"center",padding:40}}><div style={{fontSize:64,marginBottom:16}}>{"\u{1F389}"}</div><h2 style={{fontSize:28,fontWeight:800,margin:"0 0 12px"}}>Mini-Game Complete!</h2><p style={{color:"rgba(255,255,255,0.6)",marginBottom:8}}>Score: {score}/{gd.challenges.length}</p>{gameType==="speedType"&&<p style={{color:"rgba(255,255,255,0.5)",marginBottom:24}}>Time: {el}s</p>}<button onClick={()=>onComplete(score)} style={{padding:"14px 32px",borderRadius:14,border:"none",background:"linear-gradient(135deg, #A29BFE, #6C5CE7)",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:16}}>Continue {"\u2192"}</button></div>);}
  if(gameType==="bugSquash"){const ch=gd.challenges[ci];return(<div style={{padding:24}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><h2 style={{fontSize:22,fontWeight:800,margin:0}}>{gd.title}</h2><span style={{color:"rgba(255,255,255,0.4)",fontSize:14}}>{ci+1}/{gd.challenges.length}</span></div><div style={{background:"rgba(245,101,101,0.08)",border:"1px solid rgba(245,101,101,0.2)",borderRadius:14,padding:20,marginBottom:16,fontFamily:"'Fira Code', monospace",fontSize:14,whiteSpace:"pre-wrap"}}><div style={{fontSize:11,color:"#F56565",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{"\u{1F41B}"} Buggy:</div>{ch.buggy}</div><textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="Fix the code..." style={{width:"100%",minHeight:100,padding:16,borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#fff",fontSize:14,fontFamily:"'Fira Code', monospace",outline:"none",resize:"vertical",boxSizing:"border-box"}}/>{fb&&<div style={{marginTop:12,padding:"10px 16px",borderRadius:10,background:fb==="correct"?"rgba(72,187,120,0.15)":"rgba(245,101,101,0.15)",color:fb==="correct"?"#48BB78":"#F56565",fontSize:14,fontWeight:600}}>{fb==="correct"?"\u2705 Fixed!":"\u274C "+ch.hint}</div>}<div style={{display:"flex",gap:12,marginTop:16}}><button onClick={()=>{const cl=s=>s.replace(/\s+/g," ").trim();if(cl(input)===cl(ch.fixed)){setFb("correct");setScore(s=>s+1);setTimeout(()=>{if(ci+1<gd.challenges.length){setCi(i=>i+1);setInput("");setFb(null);}else setDone(true);},1000);}else setFb("wrong");}} style={{padding:"12px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg, #48BB78, #38A169)",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Check</button></div></div>);}
  if(gameType==="codePuzzle"){const ch=gd.challenges[ci];const mv=(f,d)=>{const n=[...po];const t=f+d;if(t<0||t>=n.length)return;[n[f],n[t]]=[n[t],n[f]];setPo(n);};return(<div style={{padding:24}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><h2 style={{fontSize:22,fontWeight:800,margin:0}}>{gd.title}</h2><span style={{color:"rgba(255,255,255,0.4)",fontSize:14}}>{ci+1}/{gd.challenges.length}</span></div><p style={{color:"rgba(255,255,255,0.6)",marginBottom:20}}>Arrange lines in order!</p><div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>{po.map((li,pi)=>(<div key={pi} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 14px",border:"1px solid rgba(255,255,255,0.08)"}}><span style={{color:"rgba(255,255,255,0.3)",fontSize:13,width:24}}>{pi+1}.</span><code style={{flex:1,fontFamily:"'Fira Code', monospace",fontSize:14}}>{ch.lines[li]}</code><div style={{display:"flex",flexDirection:"column",gap:2}}><button onClick={()=>mv(pi,-1)} style={{width:24,height:20,borderRadius:4,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:10}}>{"\u25B2"}</button><button onClick={()=>mv(pi,1)} style={{width:24,height:20,borderRadius:4,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:10}}>{"\u25BC"}</button></div></div>))}</div>{fb&&<div style={{marginBottom:16,padding:"10px 16px",borderRadius:10,background:fb==="correct"?"rgba(72,187,120,0.15)":"rgba(245,101,101,0.15)",color:fb==="correct"?"#48BB78":"#F56565",fontSize:14,fontWeight:600}}>{fb==="correct"?"\u2705 Perfect!":"\u274C Try again!"}</div>}<button onClick={()=>{if(po.every((l,p)=>l===ch.correct[p])){setFb("correct");setScore(s=>s+1);setTimeout(()=>{if(ci+1<gd.challenges.length){setCi(i=>i+1);setFb(null);}else setDone(true);},1000);}else setFb("wrong");}} style={{padding:"12px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg, #A29BFE, #6C5CE7)",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Check Order</button></div>);}
  if(gameType==="speedType"){const target=gd.challenges[ci];return(<div style={{padding:24}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}><h2 style={{fontSize:22,fontWeight:800,margin:0}}>{gd.title}</h2><div style={{display:"flex",gap:16}}><span style={{color:"#F6AD55",fontWeight:700}}>{"\u23F1"} {el}s</span><span style={{color:"rgba(255,255,255,0.4)",fontSize:14}}>{ci+1}/{gd.challenges.length}</span></div></div><div style={{background:"rgba(162,155,254,0.08)",border:"1px solid rgba(162,155,254,0.2)",borderRadius:14,padding:20,marginBottom:16,textAlign:"center",fontFamily:"'Fira Code', monospace",fontSize:20}}>{target.split("").map((ch,i)=>(<span key={i} style={{color:i<input.length?(input[i]===ch?"#48BB78":"#F56565"):"rgba(255,255,255,0.6)"}}>{ch}</span>))}</div><input type="text" value={input} onChange={e=>{setInput(e.target.value);if(e.target.value===target){setScore(s=>s+1);setTimeout(()=>{if(ci+1<gd.challenges.length){setCi(i=>i+1);setInput("");}else setDone(true);},500);}}} autoFocus placeholder="Start typing..." style={{width:"100%",padding:"14px 18px",borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#fff",fontSize:18,fontFamily:"'Fira Code', monospace",outline:"none",boxSizing:"border-box"}}/></div>);}
  return null;
}

          </div>
        );})}
      </div>
      <div style={{padding:"24px 24px 8px",maxWidth:600,margin:"0 auto"}}><div style={{background:`${tier.tierColor}08`,borderRadius:20,padding:24,border:`1px solid ${tier.tierColor}15`,textAlign:"center"}}><div style={{fontSize:40,marginBottom:8}}>{char.emoji}</div><h2 style={{margin:"0 0 4px",fontSize:24,fontWeight:800}}>{unit.title}</h2><p style={{margin:0,color:"rgba(255,255,255,0.5)",fontSize:14}}>{unit.desc}</p></div></div>

function BuildMode({user, onBack}) {
  const [code, setCode] = useState("# Welcome to Build Mode!\n# Write any Python code here and hit Run.\n\nprint(\"Hello, world!\")\n");
  const [userInputs, setUserInputs] = useState([]);
  const [currentInput, setCurrentInput] = useState("");
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);
  const [needsInput, setNeedsInput] = useState(false);
  const [savedProjects, setSavedProjects] = useState([]);
  const [projectName, setProjectName] = useState("My Project");
  const [showSaved, setShowSaved] = useState(false);
  const inputRef = useRef(null);
  const textareaRef = useRef(null);

  const handleRun = () => {
    const ic = (code.match(/input\(/g) || []).length;
    if (ic > 0) {
      setNeedsInput(true);
      setUserInputs([]);
      setResult(null);
      setRunning(false);
    } else {
      setNeedsInput(false);
      setRunning(true);
      setTimeout(() => {
        setResult(runPython(code, []));
        setRunning(false);
      }, 300);
    }
  };

  const submitInput = () => {
    const ni = [...userInputs, currentInput];
    setUserInputs(ni);
    setCurrentInput("");
    const ic = (code.match(/input\(/g) || []).length;
    if (ni.length >= ic) {
      setRunning(true);
      setNeedsInput(false);
      setTimeout(() => {
        setResult(runPython(code, ni));
        setRunning(false);
      }, 300);
    }
  };

  const handleSave = () => {
    const project = { name: projectName, code, date: new Date().toLocaleString() };
    setSavedProjects(prev => {
      const existing = prev.findIndex(p => p.name === projectName);
      if (existing >= 0) { const n = [...prev]; n[existing] = project; return n; }
      return [...prev, project];
    });
  };

  const handleLoad = (project) => {
    setCode(project.code);
    setProjectName(project.name);
    setShowSaved(false);
    setResult(null);
  };

  const handleClear = () => {
    setCode("");
    setResult(null);
    setNeedsInput(false);
    setUserInputs([]);
    if (textareaRef.current) textareaRef.current.focus();
  };

  useEffect(() => { if (needsInput && inputRef.current) inputRef.current.focus(); }, [needsInput, userInputs]);

  const ic = (code.match(/input\(/g) || []).length;
  const lineCount = code.split("\n").length;

  return (
    <div style={{minHeight:"100vh",background:"#0F0E17"}}>
      <div style={{padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.02)",position:"sticky",top:0,zIndex:50,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onBack} style={{padding:"8px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>{"\u2190"} Map</button>
          <span style={{fontSize:20,fontWeight:900,background:"linear-gradient(135deg, #48BB78, #38A169)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{"\u{1F6E0}\uFE0F"} Build Mode</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:22}}>{user.avatar}</span>
          <span style={{fontWeight:700,fontSize:14}}>{user.name}</span>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",maxWidth:800,margin:"0 auto",padding:"20px 24px",gap:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <input value={projectName} onChange={e=>setProjectName(e.target.value)} style={{flex:"1 1 180px",padding:"10px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#fff",fontSize:15,fontWeight:700,fontFamily:"inherit",outline:"none"}} />
          <button onClick={handleSave} style={{padding:"10px 18px",borderRadius:12,border:"none",background:"linear-gradient(135deg, #A29BFE, #6C5CE7)",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13,display:"flex",alignItems:"center",gap:6}}>{"\u{1F4BE}"} Save</button>
          <button onClick={()=>setShowSaved(!showSaved)} style={{padding:"10px 18px",borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",background:showSaved?"rgba(162,155,254,0.15)":"transparent",color:showSaved?"#A29BFE":"rgba(255,255,255,0.5)",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13,display:"flex",alignItems:"center",gap:6}}>{"\u{1F4C2}"} Projects{savedProjects.length>0?` (${savedProjects.length})`:""}</button>
        </div>

        {showSaved && (
          <div style={{background:"rgba(255,255,255,0.03)",borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",padding:16}}>
            {savedProjects.length === 0 ? (
              <p style={{color:"rgba(255,255,255,0.3)",textAlign:"center",margin:0,padding:16,fontSize:14}}>No saved projects yet. Write some code and hit Save!</p>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {savedProjects.map((p, i) => (
                  <button key={i} onClick={()=>handleLoad(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.02)",cursor:"pointer",fontFamily:"inherit",textAlign:"left",color:"#fff",width:"100%"}}>
                    <div><div style={{fontWeight:700,fontSize:14}}>{p.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>{p.date}</div></div>
                    <span style={{color:"#A29BFE",fontSize:12,fontWeight:700}}>Open {"\u2192"}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        <div style={{background:"#0D1117",borderRadius:16,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"rgba(255,255,255,0.04)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:12,height:12,borderRadius:"50%",background:"#F56565"}}/>
              <div style={{width:12,height:12,borderRadius:"50%",background:"#F6AD55"}}/>
              <div style={{width:12,height:12,borderRadius:"50%",background:"#48BB78"}}/>
              <span style={{marginLeft:8,fontSize:12,color:"rgba(255,255,255,0.4)",fontFamily:"'Fira Code', monospace"}}>build.py</span>
            </div>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.25)"}}>{lineCount} lines</span>
          </div>
          <div style={{position:"relative"}}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:44,background:"rgba(255,255,255,0.02)",borderRight:"1px solid rgba(255,255,255,0.04)",padding:"16px 0",fontFamily:"'Fira Code', monospace",fontSize:14,lineHeight:1.8,color:"rgba(255,255,255,0.15)",textAlign:"right",pointerEvents:"none",userSelect:"none"}}>
              {code.split("\n").map((_, i) => (<div key={i} style={{paddingRight:8}}>{i + 1}</div>))}
            </div>
            <textarea ref={textareaRef} value={code} onChange={e => setCode(e.target.value)} spellCheck={false} style={{width:"100%",minHeight:260,padding:"16px 16px 16px 52px",border:"none",background:"transparent",color:"#48BB78",fontSize:14,fontFamily:"'Fira Code', 'Courier New', monospace",outline:"none",resize:"vertical",boxSizing:"border-box",lineHeight:1.8,tabSize:4}} onKeyDown={e => {
              if (e.key === "Tab") {
                e.preventDefault();
                const start = e.target.selectionStart;
                const end = e.target.selectionEnd;
                setCode(code.substring(0, start) + "    " + code.substring(end));
                setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = start + 4; }, 0);
              }
            }} />
          </div>
        </div>

        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button onClick={handleRun} style={{flex:"1 1 auto",padding:"14px 24px",borderRadius:14,border:"none",background:"linear-gradient(135deg, #48BB78, #38A169)",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{"\u25B6"} Run Code</button>
          <button onClick={handleClear} style={{padding:"14px 20px",borderRadius:14,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(255,255,255,0.5)",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>Clear</button>
        </div>

        <div style={{background:"#0D1117",borderRadius:16,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden"}}>
          <div style={{padding:"10px 16px",background:"rgba(255,255,255,0.04)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,0.4)",fontFamily:"'Fira Code', monospace"}}>{"\u25B6"} Output</span>
          </div>
          <div style={{padding:16,fontFamily:"'Fira Code', 'Courier New', monospace",fontSize:14,minHeight:80,maxHeight:300,overflowY:"auto"}}>
            {!running && !result && !needsInput && <span style={{color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>Hit "Run Code" to see your output here...</span>}
            {running && <div style={{color:"#F6AD55",display:"flex",alignItems:"center",gap:8}}><span style={{animation:"pulse 1s infinite"}}>{"\u25CF"}</span> Running...</div>}
            {needsInput && !result && <div>
              <div style={{color:"#48BB78",marginBottom:8}}>{"\u25B6"} Program needs {ic} input{ic > 1 ? "s" : ""}. Enter input {userInputs.length + 1} of {ic}:</div>
              {userInputs.map((inp, i) => (<div key={i} style={{color:"rgba(255,255,255,0.5)",marginBottom:4}}><span style={{color:"#63B3ED"}}>input {i + 1}:</span> {inp}</div>))}
              {userInputs.length < ic && <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
                <span style={{color:"#48BB78"}}>{">"}</span>
                <input ref={inputRef} value={currentInput} onChange={e => setCurrentInput(e.target.value)} onKeyDown={e => e.key === "Enter" && submitInput()} placeholder="Type input..." style={{flex:1,background:"transparent",border:"none",color:"#fff",fontSize:14,fontFamily:"'Fira Code', monospace",outline:"none"}} />
                <button onClick={submitInput} style={{padding:"4px 12px",borderRadius:6,background:"rgba(72,187,120,0.2)",border:"1px solid rgba(72,187,120,0.3)",color:"#48BB78",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>Enter</button>
              </div>}
            </div>}
            {result && <div>
              {result.output ? <pre style={{margin:0,color:"#E2E8F0",whiteSpace:"pre-wrap",lineHeight:1.7}}>{result.output}</pre> : <span style={{color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>(no output)</span>}
              {result.items?.some(i => i.isError) && <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"rgba(245,101,101,0.1)",color:"#F56565",fontSize:13}}>{"\u26A0"} Error in your code. Check for typos!</div>}
            </div>}
          </div>
        </div>

        <div style={{background:"rgba(72,187,120,0.06)",borderRadius:16,border:"1px solid rgba(72,187,120,0.12)",padding:20}}>
          <div style={{fontWeight:800,color:"#48BB78",marginBottom:8,fontSize:14}}>{"\u{1F4A1}"} Build Mode Tips</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:13,lineHeight:1.8}}>
            This is your sandbox! Write any Python code you want. Try making a calculator, a quiz game, a greeting program, or anything you can dream up. Use what you have learned from the lessons, or experiment with new ideas. Press Tab to indent your code.
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null); const [progress,setProgress]=useState({}); const [activeStone,setActiveStone]=useState(null); const [placementTest,setPlacementTest]=useState(null); const [buildMode,setBuildMode]=useState(false);
  const handleSC=(si)=>{if(!activeStone)return;const k=`${activeStone.tierIdx}-${activeStone.unitIdx}-${activeStone.stoneIdx}`;setProgress(p=>{const a=[...(p[k]||[])];a[si]=true;return{...p,[k]:a};});};
  const handleTestPass=(ti)=>{for(let t=0;t<ti;t++)for(let u=0;u<CURRICULUM[t].units.length;u++)for(let s=0;s<CURRICULUM[t].units[u].stones.length;s++){const k=`${t}-${u}-${s}`;const sc=CURRICULUM[t].units[u].stones[s].sections.length;setProgress(p=>({...p,[k]:Array(sc).fill(true)}));}setPlacementTest(null);};
  const gs=`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;500;700&display=swap');*{margin:0;padding:0;box-sizing:border-box;}@keyframes floatP{0%,100%{transform:translateY(0) translateX(0);}25%{transform:translateY(-30px) translateX(15px);}50%{transform:translateY(-10px) translateX(-10px);}75%{transform:translateY(-40px) translateX(5px);}}@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.25);}`;
  const appS={fontFamily:"'Nunito', sans-serif",minHeight:"100vh",background:"#0F0E17",color:"#FFFFFE"};
  if(!user)return(<div style={appS}><style>{gs}</style><SignInScreen onSignIn={(n,a)=>setUser({name:n,avatar:a})}/></div>);
  return (
    <div style={appS}><style>{gs}</style>
      {placementTest!==null&&<PlacementTest tierIdx={placementTest} onPass={()=>handleTestPass(placementTest)} onFail={()=>setPlacementTest(null)} onCancel={()=>setPlacementTest(null)}/>}
      {buildMode?<BuildMode user={user} onBack={()=>setBuildMode(false)}/>
      :activeStone?<StoneDetailView stone={CURRICULUM[activeStone.tierIdx].units[activeStone.unitIdx].stones[activeStone.stoneIdx]} character={CURRICULUM[activeStone.tierIdx].character} progress={progress[`${activeStone.tierIdx}-${activeStone.unitIdx}-${activeStone.stoneIdx}`]||[]} onSectionComplete={handleSC} onBack={()=>setActiveStone(null)}/>
      :<WorldMap user={user} progress={progress} onSelectStone={(t,u,s)=>setActiveStone({tierIdx:t,unitIdx:u,stoneIdx:s})} onJumpTo={ti=>setPlacementTest(ti)} onBuild={()=>setBuildMode(true)}/>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
